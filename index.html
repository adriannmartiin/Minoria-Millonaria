const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function getACtx() { if (!_actx) _actx = new AudioCtx(); return _actx; }

function playTone(freq, type, duration, vol = 0.3, delay = 0) {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t); osc.stop(t + duration);
  } catch(e) {}
}

.bar-a{height:100%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:100px 0 0 100px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative;z-index:1}
.bar-track::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,#3b82f6);border-radius:100px;z-index:0}
.bar-total{text-align:center;font-size:.75rem;color:rgba(255,255,255,.28);margin-top:8px;font-weight:600}
.hidden-bar{background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.15);border-radius:12px;padding:18px;text-align:center;font-size:.78rem;letter-spacing:.2em;color:rgba(255,255,255,.3);text-transform:uppercase;font-weight:700;animation:pls 1.8s infinite}
@keyframes pls{0%,100%{border-color:rgba(255,255,255,.12)}50%{border-color:rgba(255,255,255,.35)}}
.waiting{text-align:center;padding:40px 0}
.dots{display:inline-flex;gap:8px;margin-bottom:14px}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.25);animation:db 1.4s infinite}
.dot:nth-child(2){animation-delay:.22s}.dot:nth-child(3){animation-delay:.44s}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.25}40%{transform:translateY(-8px);opacity:1}}
.wait-txt{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:700;margin-bottom:8px}
.result{text-align:center}
.verdict{font-family:'Orbitron',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;margin-bottom:10px}
.verdict.win{color:#4ade80}.verdict.lose{color:#f87171}.verdict.tie{color:#fbbf24}
.verdict-sub{color:rgba(255,255,255,.4);font-size:.9rem;margin-bottom:20px;font-weight:500}
.token-delta{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:24px}
.token-delta.p{color:#4ade80}.token-delta.n{color:#f87171}.token-delta.z{color:rgba(255,255,255,.4)}
.next-round{font-size:.78rem;letter-spacing:.15em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:16px;font-weight:700}
.r-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 24px;color:#fff;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.1em;margin-top:16px}
.r-btn:hover{background:rgba(255,255,255,.1)}
/* PROFILE */
.profile{min-height:100vh;padding:28px 24px}
.profile-hero{display:flex;align-items:center;gap:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:28px;margin-bottom:24px;max-width:800px}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:#0a0a0f;flex-shrink:0}
.profile-name{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:#fff;margin-bottom:4px}
.profile-email{font-size:.85rem;color:rgba(255,255,255,.35);font-weight:500}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;max-width:800px}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px;text-align:center}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;color:#fbbf24;margin-bottom:4px}
.stat-lbl{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:700}
.section-title{font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px;margin-top:8px;max-width:800px}
.history-list{display:flex;flex-direction:column;gap:8px;max-width:800px;margin-bottom:28px}
.history-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 18px;gap:10px;flex-wrap:wrap}
.history-q{font-size:.9rem;font-weight:600;color:rgba(255,255,255,.7);flex:1;min-width:140px}
.history-room{font-size:.72rem;letter-spacing:.1em;color:rgba(255,255,255,.3);font-weight:700;text-transform:uppercase}
.history-delta{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700}
.history-delta.p{color:#4ade80}.history-delta.n{color:#f87171}.history-delta.z{color:rgba(255,255,255,.3)}
.pw-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px;max-width:800px;margin-bottom:24px}
.pw-title{font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.2em;text-transform:uppercase;margin-bottom:18px}
.pw-row{display:flex;gap:12px;flex-wrap:wrap}
.pw-row .field{flex:1;min-width:180px;margin-bottom:0}
.btn-sm{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:10px;padding:13px 22px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap;margin-top:24px}
.btn-sm:hover{opacity:.88}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}
.logout-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:13px 22px;color:#fca5a5;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;max-width:800px;width:100%}
/* TERMS */
.terms{min-height:100vh;padding:28px 24px;max-width:800px;margin:0 auto}
.terms h2{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#fbbf24;letter-spacing:.1em;margin:24px 0 10px}
.terms p{font-size:.9rem;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:12px;font-weight:500}
.terms-footer{text-align:center;padding:20px 0 40px;font-size:.8rem;color:rgba(255,255,255,.2)}
.footer-links{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap}
.footer-link{font-size:.72rem;color:rgba(255,255,255,.25);cursor:pointer;letter-spacing:.1em;font-weight:600;text-decoration:underline}
.footer-link:hover{color:rgba(255,255,255,.5)}
/* VOTE FLASH */
@keyframes vote-flash{0%{transform:scale(1)}30%{transform:scale(1.06)}100%{transform:scale(1)}}
.choice.flash{animation:vote-flash .25s ease}
/* STREAK BADGE */
.streak-bar{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:12px;padding:10px 18px;margin-bottom:20px}
.streak-fire{font-size:1.3rem}
.streak-txt{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;color:#fbbf24;letter-spacing:.08em}
/* RANKING */
.ranking{min-height:100vh;padding:28px 24px}
.rank-list{display:flex;flex-direction:column;gap:10px;max-width:700px;margin:0 auto}
.rank-row{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 20px}
.rank-pos{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:rgba(255,255,255,.2);width:28px;flex-shrink:0}
.rank-pos.gold{color:#fbbf24}
.rank-pos.silver{color:#94a3b8}
.rank-pos.bronze{color:#b45309}
.rank-name{font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#fff;flex:1}
.rank-streak{font-size:.78rem;font-weight:700;color:#f97316;letter-spacing:.06em}
.rank-tokens{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;color:#4ade80}
/* DAILY BONUS MODAL */
.bonus-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:20px 0}
.bonus-day{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 4px;text-align:center}
.bonus-day.done{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3)}
.bonus-day.today{background:rgba(251,191,36,.15);border-color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.25)}
.bonus-day.locked{opacity:.35}
.bonus-day-num{font-size:.6rem;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.bonus-day-val{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;color:#fbbf24}
/* TOKEN CHART */
.chart-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:24px;max-width:800px}
.chart-title{font-family:'Orbitron',sans-serif;font-size:.72rem;color:rgba(255,255,255,.35);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;font-weight:700}
/* COIN GLOW ON WIN */
@keyframes coin-glow{0%,100%{filter:drop-shadow(0 0 0px #fbbf24)}50%{filter:drop-shadow(0 0 8px #fbbf24)}}
.coin-glow img{animation:coin-glow 1s ease infinite}
/* TOURNAMENTS */
.tourn{min-height:100vh;padding:28px 24px}
.tourn-list{display:flex;flex-direction:column;gap:14px;max-width:700px;margin:0 auto}
.tourn-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px;transition:all .2s}
.tourn-card:hover{border-color:rgba(251,191,36,.3)}
.tourn-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;color:#fff;margin-bottom:8px}
.tourn-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.tourn-badge{font-size:.72rem;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.tourn-badge.date{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.tourn-badge.prize{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.tourn-badge.entry{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.tourn-badge.players{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.1)}
.tourn-tz{font-size:.78rem;color:rgba(255,255,255,.3);margin-bottom:14px}
.tz-select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:.82rem;outline:none;cursor:pointer}
.tourn-btn{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:10px;padding:12px 24px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;letter-spacing:.1em;transition:opacity .2s}
.tourn-btn:hover{opacity:.88}
.tourn-btn.joined{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;cursor:default}
.tourn-btn.joined:hover{opacity:1}
.tourn-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.2);font-size:.9rem}
/* NOTIFICATIONS */
.notif-dot{width:8px;height:8px;background:#f87171;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.notif-panel{position:fixed;top:70px;right:20px;width:320px;background:#0d0d18;border:1px solid rgba(255,255,255,.1);border-radius:16px;z-index:9000;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.notif-hdr{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06);font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.15em}
.notif-item{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.notif-item:hover{background:rgba(255,255,255,.04)}
.notif-item-title{font-size:.85rem;font-weight:700;color:#fff;margin-bottom:3px}
.notif-item-sub{font-size:.75rem;color:rgba(255,255,255,.3);font-weight:500}
.notif-item.unread .notif-item-title{color:#fbbf24}
/* REFERRAL */
.ref-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:14px;padding:20px;max-width:800px;margin-bottom:24px}
.ref-title{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.2em;margin-bottom:12px}
.ref-link{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ref-code{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-family:'Orbitron',sans-serif;font-size:.8rem;color:#fbbf24;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ref-copy{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:8px;padding:10px 18px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ref-info{font-size:.8rem;color:rgba(255,255,255,.35);margin-top:10px;line-height:1.6}
/* MISSIONS */
.missions-screen{min-height:100vh;padding:28px 24px}
.mission-list{display:flex;flex-direction:column;gap:10px;max-width:800px;margin:0 auto}
.mission-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.mission-row.done{border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.04)}
.mission-row.claimed{opacity:.5}
.mission-icon{font-size:1.5rem;flex-shrink:0}
.mission-info{flex:1}
.mission-title{font-size:.88rem;font-weight:700;color:#fff;margin-bottom:3px}
.mission-desc{font-size:.75rem;color:rgba(255,255,255,.35)}
.mission-prog{height:5px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;margin-top:8px}
.mission-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#d97706);border-radius:100px;transition:width .6s}
.mission-bar.done{background:linear-gradient(90deg,#4ade80,#16a34a)}
.mission-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.mission-reward{font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;color:#4ade80}
.mission-claim{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:8px;padding:8px 14px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.62rem;font-weight:700;cursor:pointer;letter-spacing:.08em}
.mission-done-tag{font-size:.7rem;color:#4ade80;font-weight:700;letter-spacing:.1em}
/* REDEEM */
.redeem-screen{min-height:100vh;padding:28px 24px;max-width:800px;margin:0 auto}
.redeem-coming{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:16px;padding:20px 24px;margin-bottom:28px;display:flex;gap:16px;align-items:flex-start}
.redeem-coming-title{font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:900;color:#f87171;margin-bottom:6px;letter-spacing:.06em}
.redeem-coming-sub{font-size:.82rem;color:rgba(255,255,255,.4);line-height:1.6}
.redeem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.redeem-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:24px 14px;text-align:center;opacity:.55}
.redeem-eur{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:#fbbf24;margin-bottom:6px}
.redeem-tok{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:600}
.redeem-ratio{font-size:.7rem;color:#4ade80;font-weight:700;letter-spacing:.08em}
.redeem-lock{font-size:.68rem;color:rgba(255,255,255,.2);margin-top:10px;font-weight:700;letter-spacing:.08em}
.redeem-info{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;font-size:.82rem;color:rgba(255,255,255,.35);line-height:1.9}
/* SEASON COUNTDOWN */
.season-bar{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(251,191,36,.03));border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;max-width:1100px;margin-left:auto;margin-right:auto}
.season-label{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em}
.season-title{font-size:.88rem;font-weight:700;color:#fbbf24;margin-top:2px}
.season-timer{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:#fbbf24;letter-spacing:.08em;text-shadow:0 0 20px rgba(251,191,36,.4)}
/* TOP PLAYERS */
.top-panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:20px;margin-bottom:28px;max-width:1100px;margin-left:auto;margin-right:auto}
.top-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.top-panel-title{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em}
.top-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;transition:background .2s}
.top-row:hover{background:rgba(255,255,255,.03)}
.top-row.me{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15)}
.top-pos{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:900;width:28px;text-align:center;flex-shrink:0}
.top-name{flex:1;font-size:.88rem;font-weight:700;color:#fff}
.top-tokens{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;color:#4ade80}
.top-expand-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 16px;color:rgba(255,255,255,.35);font-family:'Orbitron',sans-serif;font-size:.62rem;font-weight:700;cursor:pointer;width:100%;margin-top:10px;letter-spacing:.1em;transition:all .2s}
.top-expand-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6)}
/* TOURNAMENT BANNER */
.tourn-banner{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,191,36,.05));border:1px solid rgba(251,191,36,.25);border-radius:14px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:24px;max-width:1100px;margin-left:auto;margin-right:auto;cursor:pointer;transition:all .2s}
.tourn-banner:hover{border-color:rgba(251,191,36,.5)}
.tourn-banner-txt{font-size:.88rem;color:#fbbf24;font-weight:700}
.tourn-banner-sub{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:3px}
.tourn-banner-btn{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:8px 16px;color:#fbbf24;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.08em}
/* SHIELD */
@keyframes shield-pulse{0%,100%{filter:drop-shadow(0 0 6px #60a5fa) brightness(1)}50%{filter:drop-shadow(0 0 16px #60a5fa) brightness(1.3)}}
@keyframes shield-pulse-full{0%,100%{filter:drop-shadow(0 0 6px #4ade80) brightness(1)}50%{filter:drop-shadow(0 0 16px #4ade80) brightness(1.3)}}
.shield-lobby{max-width:1100px;margin:0 auto 20px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.shield-icon-big{font-size:2rem;flex-shrink:0}
.shield-info-col{flex:1;min-width:140px}
.shield-name{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.12em;margin-bottom:3px}
.shield-status{font-size:.8rem;font-weight:600}
.shield-status.none{color:rgba(255,255,255,.3)}
.shield-status.half{color:#60a5fa}
.shield-status.full{color:#4ade80}
.shield-status.cd{color:rgba(255,255,255,.2)}

function SeasonAdmin({ sbUrl, sbKey }) {
  const [msg, setMsg] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [topPlayers, setTopPlayers] = React.useState([]);

  React.useEffect(() => {
    fetch(`${sbUrl}/rest/v1/profiles?select=username,tokens&order=tokens.desc&limit=10`, {headers:{apikey:sbKey}})
      .then(r=>r.json()).then(d => setTopPlayers(Array.isArray(d)?d:[])).catch(()=>{});
  }, []);

  async function resetSeason(newNum) {
    if (!window.confirm(`¿Seguro? Esto resetea los tokens de TODOS los jugadores a 2.500 e inicia la Temporada ${newNum}. No se puede deshacer.`)) return;
    setLoading(true); setMsg("");
    try {
      // Reset all tokens to 2500
      await fetch(`${sbUrl}/rest/v1/profiles?id=neq.00000000-0000-0000-0000-000000000000`, {
        method:"PATCH", headers:{apikey:sbKey, Authorization:`Bearer ${sbKey}`, "Content-Type":"application/json", Prefer:"return=minimal"},
        body: JSON.stringify({ tokens: 2500, win_streak: 0, shield_level: 0, shield_ads_watched: 0, shield_cooldown: 0, ad_cycle_start: 0, ad_cycle_watched: 0, rescue_count: 0, rescue_cooldown: 0 })
      });
      setMsg(`✅ Temporada ${newNum} iniciada. Todos los tokens reseteados a 2.500.`);
    } catch(e) { setMsg("❌ Error al resetear la temporada"); }
    setLoading(false);
  }

  const card = {background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:"20px",marginBottom:16};
  const val = {fontFamily:"'Orbitron',sans-serif",fontSize:"1.4rem",fontWeight:900,color:"#fbbf24",marginBottom:4};
  const lbl = {fontSize:".72rem",color:"rgba(255,255,255,.35)",letterSpacing:".15em",textTransform:"uppercase"};

  return (
    <div>
      {msg && <div className="ok" style={{maxWidth:"100%",marginBottom:16,color:msg.startsWith("✅")?"#4ade80":"#f87171"}}>{msg}</div>}
      <div style={card}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".75rem",color:"rgba(255,255,255,.3)",letterSpacing:".2em",marginBottom:16}}>🏆 TOP JUGADORES ACTUALES</div>
        {topPlayers.map((p,i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
            <span style={{color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#b45309":"#fff",fontWeight:700}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`} {p.username}</span>
            <span style={{fontFamily:"'Orbitron',sans-serif",color:"#4ade80",fontSize:".85rem"}}>{(p.tokens||0).toLocaleString()} 🪙</span>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(239,68,68,.06)",border:"2px solid rgba(239,68,68,.3)",borderRadius:16,padding:"24px"}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".8rem",color:"#f87171",letterSpacing:".1em",marginBottom:8}}>⚠️ ZONA PELIGROSA</div>
        <div style={{fontSize:".85rem",color:"rgba(255,255,255,.5)",marginBottom:20,lineHeight:1.7}}>
          Antes de resetear, anota manualmente los ganadores y entrégales los premios. El reset es <strong style={{color:"#f87171"}}>irreversible</strong>.
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <button onClick={() => resetSeason(2)} disabled={loading} style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.4)",borderRadius:10,padding:"12px 24px",color:"#f87171",fontFamily:"'Orbitron',sans-serif",fontSize:".72rem",fontWeight:700,cursor:"pointer",letterSpacing:".08em"}}>
            {loading ? "PROCESANDO..." : "🔄 INICIAR TEMPORADA 2"}
          </button>
        </div>
      </div>
    </div>
  );
}

function AdminStats({ sbUrl, sbKey }) {
  const [stats, setStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => { loadStats(); }, []);
  async function loadStats() {
    setLoading(true);
    try {
      const h24 = new Date(Date.now()-86400000).toISOString();
      const h48 = new Date(Date.now()-172800000).toISOString();
      const w1  = new Date(Date.now()-604800000).toISOString();
      const m1  = new Date(Date.now()-2592000000).toISOString();
      const [profiles, history, referrals, adViews, topProfiles] = await Promise.all([
        fetch(`${sbUrl}/rest/v1/profiles?select=id,tokens,created_at`,{headers:{apikey:sbKey}}).then(r=>r.json()),
        fetch(`${sbUrl}/rest/v1/match_history?select=room_id,created_at`,{headers:{apikey:sbKey}}).then(r=>r.json()),
        fetch(`${sbUrl}/rest/v1/referrals?select=id`,{headers:{apikey:sbKey}}).then(r=>r.json()),
        fetch(`${sbUrl}/rest/v1/ad_views?select=id,viewed_at`,{headers:{apikey:sbKey}}).then(r=>r.json()).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/profiles?select=username,tokens&order=tokens.desc&limit=10`,{headers:{apikey:sbKey}}).then(r=>r.json()).catch(()=>[]),
      ]);
      const p = Array.isArray(profiles)?profiles:[];
      const h = Array.isArray(history)?history:[];
      const av = Array.isArray(adViews)?adViews:[];
      const top10 = Array.isArray(topProfiles)?topProfiles:[];
      const roomCounts={};
      h.forEach(r=>{roomCounts[r.room_id]=(roomCounts[r.room_id]||0)+1;});
      setStats({
        totalUsers:p.length,
        tokensInCirculation:p.reduce((s,u)=>s+(u.tokens||0),0),
        avgTokens: p.length ? Math.round(p.reduce((s,u)=>s+(u.tokens||0),0)/p.length) : 0,
        totalGames:h.length,
        reg24h:p.filter(u=>new Date(u.created_at)>new Date(h24)).length,
        reg48h:p.filter(u=>new Date(u.created_at)>new Date(h48)).length,
        regW:p.filter(u=>new Date(u.created_at)>new Date(w1)).length,
        regM:p.filter(u=>new Date(u.created_at)>new Date(m1)).length,
        roomCounts,
        totalRefs:Array.isArray(referrals)?referrals.length:0,
        totalAds:av.length,
        ads24h:av.filter(a=>new Date(a.viewed_at)>new Date(h24)).length,
        ads48h:av.filter(a=>new Date(a.viewed_at)>new Date(h48)).length,
        adsW:av.filter(a=>new Date(a.viewed_at)>new Date(w1)).length,
        adsM:av.filter(a=>new Date(a.viewed_at)>new Date(m1)).length,
        top10,
      });
    } catch(e){}
    setLoading(false);
  }
  const card={background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"18px 20px",textAlign:"center"};
  const val={fontFamily:"'Orbitron',sans-serif",fontSize:"1.5rem",fontWeight:900,color:"#fbbf24",marginBottom:4};
  const lbl={fontSize:".7rem",color:"rgba(255,255,255,.35)",letterSpacing:".15em",textTransform:"uppercase",fontWeight:700};
  const sec={fontFamily:"'Orbitron',sans-serif",fontSize:".72rem",color:"rgba(255,255,255,.3)",letterSpacing:".2em",textTransform:"uppercase",marginBottom:12,marginTop:20};
  const grid={display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:8};
  const rooms={starter:"🌱 Starter",medium:"⚡ Medium",prime:"👑 Prime",vip:"💎 VIP",elite:"💠 Elite"};
  if(loading) return <div style={{padding:40,textAlign:"center",color:"rgba(255,255,255,.3)",fontFamily:"'Orbitron',sans-serif",fontSize:".8rem",letterSpacing:".2em"}}>CARGANDO...</div>;

function getWeekKey() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return `${d.getUTCFullYear()}-W${Math.ceil((((d - yearStart) / 86400000) + 1) / 7)}`;
}
function getWeekMissions() {
  const week = parseInt(getWeekKey().split("W")[1]) || 1;
  // Deterministic shuffle — same for ALL users same week
  const shuffled = [...MISSION_POOL].sort((a, b) => {
    const ha = (week * 2654435761 + a.id.split("").reduce((s,c)=>s+c.charCodeAt(0),0)) % 997;
    const hb = (week * 2654435761 + b.id.split("").reduce((s,c)=>s+c.charCodeAt(0),0)) % 997;
    return ha - hb;
  });
  return shuffled.slice(0, 5);
}

  async function checkDailyBonus(profile, userId, token) {
    const today = new Date().toISOString().split("T")[0];
    if (profile.last_bonus_date === today) {
      // Already claimed today — set countdown to next midnight
      setBonusAvailable(false);
      const now = new Date();
      const midnight = new Date(now); midnight.setHours(24,0,0,0);
      updateBonusCountdown(midnight.getTime());
      return;
    }
    const day = profile.last_bonus_date ? (profile.bonus_day || 0) : 0;
    const nextDay = (day % 7);
    const amount = DAILY_BONUS[nextDay];
    setBonusAmount(amount);
    setBonusDay(nextDay + 1);
    setBonusDayIdx(nextDay);
    setBonusAvailable(true);
    setBonusNextTime("");
    // Store for claiming
    window._pendingBonus = { userId, token, newToks: (profile.tokens || 0) + amount, today, nextDay, amount };
  }

  function updateBonusCountdown(targetTs) {
    const diff = targetTs - Date.now();
    if (diff <= 0) { setBonusNextTime(""); setBonusAvailable(true); return; }
    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
    setBonusNextTime(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`);
    setTimeout(() => updateBonusCountdown(targetTs), 1000);
  }

  async function claimDailyBonus() {
    const p = window._pendingBonus;
    if (!p) return;
    await dbUpdate("profiles", `id=eq.${p.userId}`, { tokens: p.newToks, last_bonus_date: p.today, bonus_day: p.nextDay + 1 }, p.token);
    tokRef.current = p.newToks;
    setUser(u => ({ ...u, tokens: p.newToks }));
    setBonusAvailable(false);
    setShowBonus(true);
    setBonusDoubleAvailable(true);
    // Set countdown to next midnight
    const midnight = new Date(); midnight.setHours(24,0,0,0);
    updateBonusCountdown(midnight.getTime());
    soundBonus();
    window._pendingBonus = null;
  }

  async function doLogin() {
    setErr(""); setMsg("");
    const { email, pw } = form;
    if (!email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }

    // Admin access — solo verifica la contraseña secreta

      tokenRef.current = data.access_token;
      userIdRef.current = data.user.id;
      const profiles = await dbGet("profiles", `id=eq.${data.user.id}`, data.access_token);
      if (profiles && profiles[0]) {
        const p = profiles[0];
        tokRef.current = p.tokens;
        setEmail(email);
        setUser({ name: p.username, tokens: p.tokens });
        setStreak(p.win_streak || 0);
        // Load ad counters from profile
        const today = new Date().toISOString().split("T")[0];
        if (p.rescue_date === today) {
          setRescueCount(p.rescue_count || 0);
          setRescueCooldown(p.rescue_cooldown || 0);
        }
        if (p.ad_cycle_start && Date.now() < p.ad_cycle_start + 6 * 3600000) {
          setCycleStart(p.ad_cycle_start);
          setCycleAdsWatched(p.ad_cycle_watched || 0);
        } else if (p.ad_cycle_start && (p.ad_cycle_watched || 0) >= 5) {
          setCycleStart(p.ad_cycle_start);
          setCycleAdsWatched(p.ad_cycle_watched || 0);
        }
        // Load shield state
        if (p.shield_cooldown && p.shield_cooldown > Date.now()) {
          setShieldCooldown(p.shield_cooldown);
        }
        if (p.shield_level > 0 && (!p.shield_cooldown || p.shield_cooldown <= Date.now())) {
          setShieldLevel(p.shield_level);
          shieldLevelRef.current = p.shield_level;
          setShieldAdsWatched(p.shield_ads_watched || 0);
        }
        checkDailyBonus(p, data.user.id, data.access_token);
        setScreen("lobby");
      } else {
        // No profile yet — check for pending registration data
        const pending = localStorage.getItem("mm_pending_profile");
        if (pending) {
          try {
            const p = JSON.parse(pending);
            await dbInsertRaw("profiles", { id: data.user.id, username: p.username, tokens: p.tokens }, data.access_token);
            tokRef.current = p.tokens;
            setEmail(email);
            setUser({ name: p.username, tokens: p.tokens });
            setShowWelcome(true);
            if (p.refCode) { setRegRefCode(p.refCode); applyReferral(data.user.id); }
            localStorage.removeItem("mm_pending_profile");
            setScreen("lobby");
          } catch(e) { setErr("Error creando perfil. Contacta con soporte."); }
        } else {
          setErr("Perfil no encontrado. Contacta con soporte.");
        }
      }
    } catch(e) { setErr("Error de conexión"); }
    setBusy(false);
  }

    const newlyUnlocked = [];

      setCycleDoubleAvail(false);
      setCycleStart(0);
      saveAdState({ ad_cycle_start: 0, ad_cycle_watched: 0 });

    setCycleAdPlaying(true); setCycleAdCountdown(5);
    let currentIdx = cycleAdsWatched;
    if (currentIdx >= 5) currentIdx = 0; // safety

  async function pollRound(r) {
    try {
      // Check if player still has enough tokens to be in this room
      if (tokRef.current < r.cost) {
        stopGame();
        setScreen("lobby");
        return;
      }

      const rows = await dbGet("game_rooms", `room_id=eq.${r.id}`, tokenRef.current);
      const row = rows && rows[0];
      if (!row) { await startNewRound(r); return; }
      const elapsed = (Date.now() - new Date(row.started_at).getTime()) / 1000;
      if (elapsed >= ROUND_TOTAL) { await startNewRound(r); return; }

      // Si es una ronda nueva (round_id distinto), resetear voto
      if (roundRef.current && roundRef.current.round_id !== row.round_id) {
        voteRef.current = null;
        setVote(null);
        setResult(null);
        resultSaved.current = false;
      }

      roundRef.current = row; setRound(row);
      const votes = await dbGet("round_votes", `round_id=eq.${row.round_id}`, tokenRef.current);
      const cA = votes ? votes.filter(v => v.vote === "a").length : 0;
      const cB = votes ? votes.filter(v => v.vote === "b").length : 0;
      setVC({ a: cA, b: cB });

      if (elapsed < VOTE_VISIBLE) {
        const tl = Math.ceil(VOTE_VISIBLE - elapsed);
        if (tl <= 3) soundTick();
        setPhase("voting"); setTL(tl);
      } else if (elapsed < VOTE_VISIBLE + VOTE_HIDDEN) {
        const tl = Math.ceil(VOTE_VISIBLE + VOTE_HIDDEN - elapsed);
        if (tl <= 3) soundTick();
        setPhase("hidden"); setTL(tl);
      } else {
        setPhase("result");
        setNextIn(Math.ceil(ROUND_TOTAL - elapsed));
        // Solo calcular resultado si el jugador votó en esta ronda
        if (!resultSaved.current && voteRef.current !== null) {
          resultSaved.current = true;
          computeResult(r, row, cA, cB);
        } else if (!resultSaved.current && voteRef.current === null) {
          resultSaved.current = true;
          setResult({ noVote: true, cA, cB, q: { a: row.question_a, b: row.question_b } });
        }
      }
    } catch(e) { console.error(e); }
  }

  async function startNewRound(r) {
    // Try to get question from DB, fallback to hardcoded
    let q = null;
    try {
      const qs = await dbGet("questions", "active=eq.true&select=question_a,question_b", KEY);
      if (Array.isArray(qs) && qs.length > 0) {
        const pick = qs[Math.floor(Math.random() * qs.length)];
        q = { a: pick.question_a, b: pick.question_b };
      }
    } catch(e) {}
    if (!q) q = rand(QUESTIONS);

    resultSaved.current = false;
    voteChangeCount.current = 0;
    setShowVoteMsg(false);
    voteRef.current = null; setVote(null); setResult(null); setVC({ a: 0, b: 0 });
    await dbUpsert("game_rooms", {
      room_id: r.id,
      round_id: (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)),
      question_a: q.a, question_b: q.b,
      started_at: new Date().toISOString(),
      votes_a: 0, votes_b: 0, phase: "voting"
    }, "room_id", tokenRef.current);
  }

  async function castVote(v) {
    if (!roundRef.current) return;
    const elapsed = (Date.now() - new Date(roundRef.current.started_at).getTime()) / 1000;
    if (elapsed >= VOTE_VISIBLE + VOTE_HIDDEN) return;
    // Rate limiting message after 5 changes

    soundVote();
    await dbUpsert("round_votes", {

      vote: v,
      room_id: roundRef.current.room_id

  async function computeResult(r, row, cA, cB) {
    const myVote = voteRef.current;
    const total = cA + cB;
    let minority = "tie";
    if (cA < cB) minority = "a";
    else if (cB < cA) minority = "b";
    let delta = 0, win = false, tie = minority === "tie";
    let resultStr = myVote === null ? "no_vote" : "lose";

    if (myVote !== null) {
      if (tie) {
        delta = 0; resultStr = "tie";
      } else {
        const minC = minority === "a" ? cA : cB;
        const prizePool = Math.floor(total * r.cost * 0.90);
        if (myVote === minority) {
          win = true; resultStr = "win";
          delta = Math.floor(prizePool / minC) - r.cost;
        } else {
          if (shieldLevelRef.current === 2) {
            delta = 0; resultStr = "lose"; // full protection
          } else if (shieldLevelRef.current === 1) {
            delta = -Math.floor(r.cost / 2); resultStr = "lose"; // half protection
          } else {
            delta = -r.cost; resultStr = "lose";
          }
        }
      }
    }
    // Consume shield after round
    resetShieldAfterRound(win);

    const newTok = Math.max(0, tokRef.current + delta);

    // Streak tracking
    let newStreak = streak;
    let newMaxStreak = 0;
    let newStreakTokens = 0;
    if (resultStr === "win") {
      newStreak = streak + 1;
      soundWin();
    } else if (resultStr === "lose") {
      newStreak = 0;
      soundLose();
    }
    setStreak(newStreak);

    // Update profile with tokens + streak
    const profileUpdate = { tokens: newTok, win_streak: newStreak };
    if (resultStr === "win") {
      profileUpdate.streak_tokens = delta;
    } else if (resultStr === "lose") {
      profileUpdate.streak_tokens = 0;
    }
    tokRef.current = newTok;
    setUser(u => ({ ...u, tokens: newTok }));
    await dbUpdate("profiles", `id=eq.${userIdRef.current}`, profileUpdate, tokenRef.current);

    setResult({ win, tie, delta, cA, cB, minority, myVote, noVote: myVote === null, q: { a: row.question_a, b: row.question_b }, streak: newStreak, shieldUsed: !win && shieldLevelRef.current > 0 ? shieldLevelRef.current : 0 });
    if (!tie && myVote !== null) {
      const pool = win ? WIN_PHRASES : LOSE_PHRASES;
      setResultPhrase(pool[Math.floor(Math.random() * pool.length)]);
    } else { setResultPhrase(""); }
    setTimeout(() => checkBadgesProgress(), 2000);

    // Save to history
    if (myVote !== null) {

            <div className="gift-msg">{showGift.message}</div>
            {showGift.tokens_gift > 0 && (
              <div className="gift-amount">+{showGift.tokens_gift.toLocaleString()} {COIN}</div>
            )}
            <button className="gift-btn" disabled={claimingGift} onClick={() => claimGift(showGift)}>
              {claimingGift ? "CANJEANDO..." : "🎁 CANJEAR REGALO"}
            </button>
          </div>
        </div>
      )}

      {/* ── SESSION EXPIRED ── */}
      {sessionExpired && (
        <div className="session-overlay">
          <div className="session-card">
            <div className="session-icon">⏰</div>
            <div className="session-title">SESIÓN EXPIRADA</div>
            <div className="session-text">
              Tu sesión ha caducado por inactividad.<br/>
              Recarga la página para volver a jugar — tus tokens y progreso están guardados.
            </div>
            <button className="session-btn" onClick={() => window.location.reload()}>
              RECARGAR Y CONTINUAR
            </button>
          </div>
        </div>
      )}

      {/* ── ADMIN ── */}
      {screen === "admin" && (
        <div className="admin">
          <div className="topbar">
            <div className="topbar-logo" style={{color:"#f87171"}}>⚙️ PANEL ADMIN</div>
            <button className="ghost-btn" onClick={() => setScreen("auth")}>← Salir</button>
          </div>

          <div className="admin-tabs">
            <div className={`admin-tab${adminTab==="tournaments"?" active":""}`} onClick={() => setAdminTab("tournaments")}>TORNEOS</div>
            <div className={`admin-tab${adminTab==="questions"?" active":""}`} onClick={() => setAdminTab("questions")}>PREGUNTAS</div>
            <div className={`admin-tab${adminTab==="announcements"?" active":""}`} onClick={() => setAdminTab("announcements")}>NOTIFICACIONES</div>
            <div className={`admin-tab${adminTab==="stats"?" active":""}`} onClick={() => setAdminTab("stats")}>ESTADÍSTICAS</div>
            <div className={`admin-tab${adminTab==="season"?" active":""}`} onClick={() => setAdminTab("season")} style={{borderColor:"rgba(239,68,68,.4)",color:adminTab==="season"?"#f87171":"rgba(239,68,68,.6)"}}>🏆 TEMPORADA</div>
          </div>

          {adminTab === "tournaments" && (
            <div>
              {adminMsg && <div className="ok" style={{maxWidth:"100%",marginBottom:16}}>{adminMsg}</div>}
              <div className="admin-form">
                <div className="admin-form-title">CREAR NUEVO TORNEO</div>
                <div className="admin-grid">
                  <div className="field" style={{marginBottom:0}}>
                    <label>Título</label>
                    <input type="text" placeholder="Torneo Martes..." value={newTourn.title}
                      onChange={e => setNewTourn(t => ({...t, title: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Fecha y hora (UTC)</label>
                    <input type="datetime-local" value={newTourn.starts_at}
                      onChange={e => setNewTourn(t => ({...t, starts_at: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Coste entrada (tokens)</label>
                    <input type="number" value={newTourn.entry_cost}
                      onChange={e => setNewTourn(t => ({...t, entry_cost: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Premio (tokens)</label>
                    <input type="number" value={newTourn.prize}
                      onChange={e => setNewTourn(t => ({...t, prize: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Máx. jugadores</label>
                    <input type="number" value={newTourn.max_players}
                      onChange={e => setNewTourn(t => ({...t, max_players: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Descripción (opcional)</label>
                    <input type="text" placeholder="Descripción..." value={newTourn.description}
                      onChange={e => setNewTourn(t => ({...t, description: e.target.value}))} />
                  </div>
                </div>
                <button className="btn-gold" style={{marginTop:16,width:"auto",padding:"12px 28px"}} onClick={createTournament}>
                  ➕ CREAR TORNEO
                </button>
              </div>

              <div className="section-title">TORNEOS EXISTENTES</div>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
                {adminTournaments.length === 0 && <div style={{color:"rgba(255,255,255,.25)",fontSize:".85rem"}}>No hay torneos creados</div>}
                {adminTournaments.map(t => (
                  <div key={t.id} className="admin-tourn-row">
                    <div>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".85rem",fontWeight:700,color:"#fff"}}>{t.title}</div>
                      <div style={{fontSize:".75rem",color:"rgba(255,255,255,.35)",marginTop:3}}>
                        {new Date(t.starts_at).toLocaleString("es-ES")} · Premio: {t.prize?.toLocaleString()} · Entrada: {t.entry_cost}
                      </div>
                    </div>
                    <button className="del-btn" onClick={() => deleteTournament(t.id)}>🗑️ BORRAR</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {adminTab === "questions" && (
            <div>
              {adminQMsg && <div className="ok" style={{maxWidth:"100%",marginBottom:16}}>{adminQMsg}</div>}
              <div className="admin-form">
                <div className="admin-form-title">AÑADIR NUEVA PREGUNTA</div>
                <div className="admin-grid">
                  <div className="field" style={{marginBottom:0}}>
                    <label>Opción A</label>
                    <input type="text" placeholder="🐶 Perros" value={newQ.question_a}
                      onChange={e => setNewQ(q => ({...q, question_a: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Opción B</label>
                    <input type="text" placeholder="🐱 Gatos" value={newQ.question_b}
                      onChange={e => setNewQ(q => ({...q, question_b: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Categoría</label>
                    <select className="tz-select" style={{width:"100%",padding:"14px 16px"}} value={newQ.category}
                      onChange={e => setNewQ(q => ({...q, category: e.target.value}))}>
                      {["General","Animales","Comida","Deporte","Tecnología","Entretenimiento","Lifestyle","Viajes","Psicología","Sociedad","Bebidas","Cultura","Ocio"].map(c => (
                        <option key={c} value={c}>{c}</option>
                      ))}
                    </select>
                  </div>
                </div>
                <button className="btn-gold" style={{marginTop:16,width:"auto",padding:"12px 28px"}} onClick={createQuestion}>
                  ➕ AÑADIR PREGUNTA
                </button>
              </div>

              <div className="section-title">
                PREGUNTAS ({adminQuestions.filter(q=>q.active).length} activas · {adminQuestions.filter(q=>!q.active).length} pausadas)
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
                {adminQuestions.length === 0 && <div style={{color:"rgba(255,255,255,.25)",fontSize:".85rem"}}>No hay preguntas</div>}
                {adminQuestions.map(q => (
                  <div key={q.id} className="admin-tourn-row" style={{opacity: q.active ? 1 : 0.45}}>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".82rem",fontWeight:700,color:"#fff"}}>
                        {q.question_a} <span style={{color:"rgba(255,255,255,.2)"}}>vs</span> {q.question_b}
                      </div>
                      <div style={{fontSize:".72rem",color:"rgba(255,255,255,.3)",marginTop:3}}>
                        {q.category} · {q.active ? <span style={{color:"#4ade80"}}>✅ Activa</span> : <span style={{color:"#f87171"}}>⏸ Pausada</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                      <button onClick={() => toggleQuestion(q)} style={{background:q.active?"rgba(251,191,36,.1)":"rgba(74,222,128,.1)",border:`1px solid ${q.active?"rgba(251,191,36,.25)":"rgba(74,222,128,.25)"}`,borderRadius:8,padding:"7px 12px",color:q.active?"#fbbf24":"#4ade80",fontSize:".65rem",fontFamily:"'Orbitron',sans-serif",fontWeight:700,cursor:"pointer"}}>
                        {q.active ? "⏸ PAUSAR" : "▶ ACTIVAR"}
                      </button>
                      <button className="del-btn" onClick={() => deleteQuestion(q.id)}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {adminTab === "announcements" && (
            <div>
              {adminMsg && <div className="ok" style={{maxWidth:"100%",marginBottom:16}}>{adminMsg}</div>}
              <div className="admin-form">
                <div className="admin-form-title">CREAR NOTIFICACIÓN / REGALO</div>
                <div className="admin-grid">
                  <div className="field" style={{marginBottom:0}}>
                    <label>Tipo</label>
                    <select className="tz-select" style={{width:"100%",padding:"14px 16px"}} value={newAnn.type}
                      onChange={e => setNewAnn(a => ({...a, type: e.target.value}))}>
                      <option value="notification">📢 Notificación</option>
                      <option value="gift">🎁 Regalo de tokens</option>
                    </select>
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Duración (horas)</label>
                    <input type="number" value={newAnn.expires_hours}
                      onChange={e => setNewAnn(a => ({...a, expires_hours: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0,gridColumn:"1/-1"}}>
                    <label>Título</label>
                    <input type="text" value={newAnn.title}
                      onChange={e => setNewAnn(a => ({...a, title: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0,gridColumn:"1/-1"}}>
                    <label>Mensaje</label>
                    <input type="text" value={newAnn.message}
                      onChange={e => setNewAnn(a => ({...a, message: e.target.value}))} />
                  </div>
                  {newAnn.type === "gift" && (
                    <div className="field" style={{marginBottom:0}}>
                      <label>Tokens a regalar</label>
                      <input type="number" value={newAnn.tokens_gift}
                        onChange={e => setNewAnn(a => ({...a, tokens_gift: +e.target.value}))} />
                    </div>
                  )}
                </div>
                <button className="btn-gold" style={{marginTop:16,width:"auto",padding:"12px 28px"}} onClick={createAnnouncement}>
                  📢 PUBLICAR
                </button>
              </div>

              <div className="section-title">ANUNCIOS ACTIVOS</div>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
                {adminAnnouncements.length === 0 && <div style={{color:"rgba(255,255,255,.25)",fontSize:".85rem"}}>No hay anuncios activos</div>}
                {adminAnnouncements.map(a => (
                  <div key={a.id} className="admin-tourn-row">
                    <div>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".85rem",fontWeight:700,color: a.type==="gift"?"#4ade80":"#fbbf24"}}>
                        {a.type==="gift"?"🎁":"📢"} {a.title}
                      </div>
                      <div style={{fontSize:".75rem",color:"rgba(255,255,255,.35)",marginTop:3}}>
                        {a.message.slice(0,60)}... · Expira: {new Date(a.expires_at).toLocaleString("es-ES")}
                        {a.tokens_gift > 0 && ` · Regalo: ${a.tokens_gift} tokens`}
                      </div>
                    </div>
                    <button className="del-btn" onClick={() => deleteAnnouncement(a.id)}>🗑️ BORRAR</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {adminTab === "stats" && (
            <AdminStats sbUrl={SB} sbKey={KEY} />
          )}

          {adminTab === "season" && (
            <SeasonAdmin sbUrl={SB} sbKey={KEY} />
          )}
        </div>
      )}

      {/* ── TUTORIAL ── */}
      {showTutorial && (
        <div className="tutorial-overlay" onClick={(e) => { if(e.target.classList.contains('tutorial-overlay')) setShowTutorial(false); }}>
          <div className="tutorial-card">
            <div className="tutorial-title">👑 ¿CÓMO FUNCIONA?</div>
            <div className="tutorial-sub">Todo lo que necesitas saber para ganar</div>

            <div className="tutorial-step">
              <div className="tutorial-step-num">1</div>
              <div className="tutorial-step-txt">
                <strong>Elige tu sala y apuesta tokens.</strong> Hay 5 salas con distintas apuestas: desde 200 tokens en Starter hasta 10.000 en Elite. Cuanto más arriesgas, más puedes ganar.
              </div>
            </div>

            <div className="tutorial-step">
              <div className="tutorial-step-num">2</div>
              <div className="tutorial-step-txt">
                <strong>Vota en 15 segundos.</strong> Se plantea una pregunta con dos opciones. Los primeros 10 segundos puedes ver en tiempo real cómo está votando el resto — y cambiar tu voto cuantas veces quieras.
              </div>
            </div>

            <div className="tutorial-step">
              <div className="tutorial-step-num">3</div>
              <div className="tutorial-step-txt">
                <strong>Los últimos 5 segundos, la barra se oculta.</strong> Ya no sabes qué está pasando. Es el momento clave — ¿cambias de bando o confías en tu instinto? Solo cuenta tu último voto.
              </div>
            </div>

            <div className="tutorial-step">
              <div className="tutorial-step-num">4</div>
              <div className="tutorial-step-txt">
                <strong>La minoría se lleva todo.</strong> El grupo con menos votos gana y se reparte el bote entre sus integrantes. Cuanto más aplastante la mayoría, mayor es el premio para los que pensaron diferente. En caso de empate, todos recuperan su apuesta.
              </div>
            </div>

            <div className="tutorial-divider" />

            <div className="tutorial-prizes">
              <div className="tutorial-prizes-title">🏆 SISTEMA DE TEMPORADAS</div>
              <div style={{fontSize:".82rem",color:"rgba(255,255,255,.45)",lineHeight:1.7,marginBottom:12}}>
                Cada temporada dura unas semanas. Al final, los jugadores con <strong style={{color:"#fff"}}>más tokens acumulados</strong> reciben premios reales en forma de tarjetas regalo.
              </div>
              <div className="tutorial-prize-row">
                <span className="tutorial-prize-name">🥇 1er puesto</span>
                <span className="tutorial-prize-val">Premio especial</span>
              </div>
              <div className="tutorial-prize-row">
                <span className="tutorial-prize-name">🥈 2º puesto</span>
                <span className="tutorial-prize-val">Premio especial</span>
              </div>
              <div className="tutorial-prize-row" style={{marginBottom:0}}>
                <span className="tutorial-prize-name">🥉 Top 10</span>
                <span className="tutorial-prize-val">Premios a confirmar</span>
              </div>
              <div style={{fontSize:".72rem",color:"rgba(255,255,255,.2)",marginTop:12,fontStyle:"italic"}}>
                Al final de cada temporada los tokens se reinician a 1.000 para todos. ¡Juega gratis y gana real!
              </div>
            </div>

            <button className="btn-gold" onClick={() => setShowTutorial(false)}>
              ¡ENTENDIDO, A JUGAR!
            </button>
          </div>
        </div>
      )}

      {/* ── SHIELD INFO MODAL ── */}
      {showShieldInfo && (
        <div className="tutorial-overlay" onClick={e => { if(e.target.classList.contains("tutorial-overlay")) setShowShieldInfo(false); }}>
          <div className="tutorial-card" style={{maxWidth:480}}>
            <div className="tutorial-title">🛡️ ESCUDO DE PROTECCIÓN</div>
            <div className="tutorial-sub">Protege tus tokens antes de jugar</div>

            <div className="tutorial-step">
              <div className="tutorial-step-num">1</div>
              <div className="tutorial-step-txt">
                <strong>Ve 1 anuncio → Protección media.</strong> Si pierdes la ronda, solo pierdes la mitad de los tokens apostados.
              </div>
            </div>
            <div className="tutorial-step">
              <div className="tutorial-step-num">2</div>
              <div className="tutorial-step-txt">
                <strong>Ve 2 anuncios → Protección total.</strong> Si pierdes, no pierdes ningún token. ¡Juegas gratis esa ronda!
              </div>
            </div>
            <div className="tutorial-step">
              <div className="tutorial-step-num">3</div>
              <div className="tutorial-step-txt">
                <strong>Si ganas con escudo,</strong> el escudo se consume pero puedes volver a activarlo viendo 1 o 2 anuncios antes de la siguiente ronda.
              </div>
            </div>
            <div className="tutorial-step">
              <div className="tutorial-step-num">4</div>
              <div className="tutorial-step-txt">
                <strong>Si el escudo te protege de una derrota,</strong> queda inhabilitado 3 horas. Planifica bien cuándo usarlo.
              </div>
            </div>

            <div style={{background:"rgba(96,165,250,.06)",border:"1px solid rgba(96,165,250,.15)",borderRadius:14,padding:"16px",marginBottom:20}}>
              <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"1.4rem",marginBottom:4}}>🔰</div>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".7rem",fontWeight:700,color:"#60a5fa"}}>1 ANUNCIO</div>
                  <div style={{fontSize:".75rem",color:"rgba(255,255,255,.4)",marginTop:2}}>Pierde solo la mitad</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"1.4rem",marginBottom:4}}>🛡️</div>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".7rem",fontWeight:700,color:"#4ade80"}}>2 ANUNCIOS</div>
                  <div style={{fontSize:".75rem",color:"rgba(255,255,255,.4)",marginTop:2}}>No pierdes nada</div>
                </div>
              </div>
            </div>

            <button className="btn-gold" onClick={() => setShowShieldInfo(false)}>ENTENDIDO</button>
          </div>
        </div>
      )}

      {/* ── COOKIE BANNER ── */}
      {showCookie && (
        <div className="cookie-banner">
          <div className="cookie-text">
            Usamos cookies para mejorar tu experiencia y mostrar anuncios personalizados.
            Consulta nuestra <span onClick={() => setScreen("privacy")}>Política de Privacidad</span>.
          </div>
          <div className="cookie-btns">
            <button className="cookie-reject" onClick={() => { localStorage.setItem("mm_cookie_ok","reject"); setShowCookie(false); }}>Rechazar</button>
            <button className="cookie-accept" onClick={() => { localStorage.setItem("mm_cookie_ok","accept"); setShowCookie(false); }}>Aceptar</button>
          </div>
        </div>
      )}

      {/* ── WELCOME MODAL ── */}
      {showWelcome && (
        <div className="modal-overlay">
          <div className="modal-card">
            <div className="modal-icon">👑</div>
            <div className="modal-title">¡BIENVENIDO A MINORÍA MILLONARIA!</div>
            <div className="modal-text">El juego donde la minoría siempre gana. Tienes <strong style={{color:"#fbbf24"}}>2.500 tokens</strong> para empezar.</div>
            <div className="modal-rules">
              <div className="modal-rule"><span>⚡</span><span>Cada ronda dura 15 segundos. Elige una opción.</span></div>
              <div className="modal-rule"><span>📊</span><span>Los primeros 10s ves cómo vota la gente en tiempo real.</span></div>
              <div className="modal-rule"><span>🔒</span><span>Los últimos 5s la barra se oculta. Puedes cambiar tu voto.</span></div>
              <div className="modal-rule"><span>🏆</span><span>Gana quien esté en la minoría. Cuanto más aplastante, mayor premio.</span></div>
              <div className="modal-rule"><span>🤝</span><span>En caso de empate se devuelve la apuesta íntegra.</span></div>
            </div>
            <button className="btn-gold" onClick={() => setShowWelcome(false)}>¡EMPEZAR A JUGAR!</button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
