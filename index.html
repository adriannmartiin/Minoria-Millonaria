async function authCall(path, body) {
  const r = await fetch(`${SB}/auth/v1/${path}`, {
    method: "POST",
    headers: { apikey: KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}
async function dbGet(table, query, token) {
  const r = await fetch(`${SB}/rest/v1/${table}?${query}&select=*`, {
    headers: { apikey: KEY, Authorization: `Bearer ${token || KEY}` },
  });
  return r.json();
}
async function dbInsert(table, body, token) {
  await fetch(`${SB}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(body),
  });
}
async function dbUpdate(table, query, body, token) {
  await fetch(`${SB}/rest/v1/${table}?${query}`, {
    method: "PATCH",
    headers: { apikey: KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(body),
  });
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function genBots(n) {
  const bias = .28 + Math.random() * .52;
  return Array.from({ length: n }, (_, i) => ({ id: i, vote: Math.random() < bias ? "a" : "b" }));
}

function App() {
  const [screen, setScreen] = useState("auth");
  const [mode, setMode] = useState("register");
  const [form, setForm] = useState({ name: "", email: "", pw: "" });
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const [user, setUser] = useState(null);
  const [room, setRoom] = useState(null);
  const [phase, setPhase] = useState("waiting");
  const [timeLeft, setTimeLeft] = useState(10);
  const [q, setQ] = useState(null);
  const [bots, setBots] = useState([]);
  const [vote, setVote] = useState("a");
  const [res, setRes] = useState(null);
  const voteRef = useRef("a");
  const botsRef = useRef([]);
  const tokRef = useRef(0);
  const tokenRef = useRef("");
  const userIdRef = useRef("");
  const t1 = useRef(null);
  const t2 = useRef(null);

  function clrTimers() { clearInterval(t1.current); clearInterval(t2.current); clearTimeout(t1.current); }

  async function doRegister() {
    setErr(""); setMsg("");
    const { name, email, pw } = form;
    if (!name.trim() || !email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    if (!email.includes("@")) { setErr("Correo no válido"); return; }
    if (pw.length < 6) { setErr("La contraseña debe tener al menos 6 caracteres"); return; }
    setBusy(true);
    try {
      const data = await authCall("signup", { email, password: pw });
      if (data.error) { setErr(data.error_description || data.error); setBusy(false); return; }
      if (data.access_token) {
        tokenRef.current = data.access_token;
        userIdRef.current = data.user.id;
        await dbInsert("profiles", { id: data.user.id, username: name, tokens: 1000 }, data.access_token);
        tokRef.current = 1000;
        setUser({ name, tokens: 1000 });
        setScreen("lobby");
      } else {
        setMsg("✅ Revisa tu correo para confirmar la cuenta");
      }
    } catch(e) { setErr("Error de conexión. Inténtalo de nuevo."); }
    setBusy(false);
  }

  async function doLogin() {
    setErr(""); setMsg("");
    const { email, pw } = form;
    if (!email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    setBusy(true);
    try {
      const data = await authCall("token?grant_type=password", { email, password: pw });
      if (data.error || !data.access_token) { setErr("Correo o contraseña incorrectos"); setBusy(false); return; }
      tokenRef.current = data.access_token;
      userIdRef.current = data.user.id;
      const profiles = await dbGet("profiles", `id=eq.${data.user.id}`, data.access_token);
      if (profiles && profiles[0]) {
        tokRef.current = profiles[0].tokens;
        setUser({ name: profiles[0].username, tokens: profiles[0].tokens });
        setScreen("lobby");
      } else {
        setErr("No se encontró el perfil");
      }
    } catch(e) { setErr("Error de conexión. Inténtalo de nuevo."); }
    setBusy(false);
  }

  function doLogout() { clrTimers(); tokenRef.current = ""; setUser(null); setScreen("auth"); }

  async function saveTok(n) {
    tokRef.current = n;
    setUser(u => ({ ...u, tokens: n }));
    await dbUpdate("profiles", `id=eq.${userIdRef.current}`, { tokens: n }, tokenRef.current);
  }

  function doVote(v) {
    if (phase === "waiting" || phase === "result") return;
    setVote(v); voteRef.current = v;
  }

  function enterRoom(r) {
    if (tokRef.current < r.cost) return;
    clrTimers();
    setRoom(r); setPhase("waiting"); setRes(null); setBots([]); setQ(null);
    setScreen("game");
    t1.current = setTimeout(() => startRound(r), 1600);
  }

  function startRound(r) {
    const q2 = rand(QUESTIONS);
    const b = genBots(r.bots);
    botsRef.current = b; setBots(b); setQ(q2);
    const iv = Math.random() < .5 ? "a" : "b";
    setVote(iv); voteRef.current = iv;
    setPhase("active_v"); setTimeLeft(10);
    let tv = 10;
    t1.current = setInterval(() => {
      tv--; setTimeLeft(tv);
      if (tv <= 0) {
        clearInterval(t1.current);
        setPhase("active_h"); setTimeLeft(5);
        let th = 5;
        t2.current = setInterval(() => {
          th--; setTimeLeft(th);
          if (th <= 0) { clearInterval(t2.current); endRound(r); }
        }, 1000);
      }
    }, 1000);
  }

  function endRound(r) {
    const pv = voteRef.current;
    const all = [...botsRef.current.map(b => b.vote), pv];
    const cA = all.filter(v => v === "a").length;
    const cB = all.filter(v => v === "b").length;
    const tot = all.length;
    let minority = "tie";
    if (cA < cB) minority = "a"; else if (cB < cA) minority = "b";
    let delta = 0, win = false, tie = minority === "tie";
    if (tie) {
      // Empate: se devuelve todo, casa no cobra nada
      delta = 0;
    } else {
      const minC = minority === "a" ? cA : cB;
      const totalPot = tot * r.cost;
      const houseCut = Math.floor(totalPot * 0.10);
      const prizePool = totalPot - houseCut;
      if (pv === minority) {
        win = true;
        delta = Math.floor(prizePool / minC) - r.cost;
      } else {
        delta = -r.cost;
      }
    }
    const newTok = Math.max(0, tokRef.current + delta);
    saveTok(newTok);
    setRes({ win, tie, delta, cA, cB, minority, pv });
    setPhase("result");
  }

  const lA = bots.filter(b => b.vote === "a").length + (vote === "a" ? 1 : 0);
  const tot = bots.length + 1;
  const pA = tot ? Math.round((lA / tot) * 100) : 50;
  const isV = phase === "active_v";
  const C = 2 * Math.PI * 33;
  const off = C - (timeLeft / (isV ? 10 : 5)) * C;
  const tc = isV ? "#fbbf24" : "#c084fc";

  return (
    <div className="app">
      <style>{CSS}</style>

      {screen === "auth" && (
        <div className="auth">
          <div className="logo-main">MINORÍA<br/>MILLONARIA</div>
          <div className="logo-sub">La minoría siempre gana</div>
          <div className="auth-card">
            <div className="auth-heading">{mode === "register" ? "CREAR CUENTA" : "INICIAR SESIÓN"}</div>
            {err && <div className="err">{err}</div>}
            {msg && <div className="ok">{msg}</div>}
            <div>
              {mode === "register" && (
                <div className="field">
                  <label>Nombre de usuario</label>
                  <input type="text" placeholder="Tu alias..." value={form.name}
                    onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
                </div>
              )}
              <div className="field">
                <label>Correo electrónico</label>
                <input type="email" placeholder="tu@correo.com" value={form.email}
                  onChange={e => setForm(f => ({ ...f, email: e.target.value }))} />
              </div>
              <div className="field">
                <label>Contraseña</label>
                <input type="password" placeholder="••••••••" value={form.pw}
                  onChange={e => setForm(f => ({ ...f, pw: e.target.value }))} />
              </div>
              <button className="btn-gold" disabled={busy}
                onClick={mode === "register" ? doRegister : doLogin}>
                {busy ? "CARGANDO..." : mode === "register" ? "REGISTRARSE · 1000 🪙 GRATIS" : "ENTRAR AL JUEGO"}
              </button>
            </div>
            <div className="auth-switch">
              {mode === "register"
                ? <span>¿Ya tienes cuenta? <span style={{color:"#fbbf24",cursor:"pointer",fontWeight:700}} onClick={() => { setMode("login"); setErr(""); setMsg(""); }}>Inicia sesión</span></span>
                : <span>¿Sin cuenta? <span style={{color:"#fbbf24",cursor:"pointer",fontWeight:700}} onClick={() => { setMode("register"); setErr(""); setMsg(""); }}>Regístrate</span></span>}
            </div>
          </div>
        </div>
      )}

      {screen === "lobby" && (
        <div className="lobby">
          <div className="topbar">
            <div className="topbar-logo">MINORÍA MILLONARIA</div>
            <div className="topbar-right">
              <div className="token-pill">🪙 {user?.tokens?.toLocaleString()}</div>
              <button className="ghost-btn" onClick={doLogout}>Salir</button>
            </div>
          </div>
          <div className="lobby-hero">
            <div className="lobby-title">ELIGE TU SALA</div>
            <div className="lobby-hint">Hola {user?.name} · Sé parte de la minoría</div>
          </div>
          <div className="rooms">
            {ROOMS.map(r => (
              <div key={r.id}
                className={`room-card${user?.tokens < r.cost ? " locked" : ""}`}
                style={{ border: `1px solid ${r.color}44` }}
                onClick={() => enterRoom(r)}>
                <span className="room-icon">{r.icon}</span>
                <div className="room-name" style={{ color: r.color }}>{r.name}</div>
                <div className="room-desc">{r.desc}</div>
                <div className="room-bet">Apuesta: <em style={{ color: r.color }}>{r.cost.toLocaleString()} 🪙</em></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {screen === "game" && room && (
        <div className="game">
          <div className="game-hdr">
            <button className="ghost-btn" onClick={() => { clrTimers(); setScreen("lobby"); }}>← Lobby</button>
            <div className="token-pill" style={{ color: room.color, borderColor: room.color + "44", background: room.color + "15" }}>
              {room.icon} {room.name} · {room.cost.toLocaleString()} 🪙
            </div>
            <div className="token-pill">🪙 {user?.tokens?.toLocaleString()}</div>
          </div>
          <div className="game-card">
            {phase === "waiting" && (
              <div className="waiting">
                <div className="dots"><div className="dot"></div><div className="dot"></div><div className="dot"></div></div>
                <div className="wait-txt">Preparando la ronda...</div>
              </div>
            )}
            {(phase === "active_v" || phase === "active_h") && q && (
              <div>
                <div className="phase-tag">
                  {phase === "active_v" ? "⚡ Votación en directo" : "🔒 Barra oculta · Decide ahora"}
                </div>
                <div className="timer-wrap">
                  <div className="timer-ring">
                    <svg width="76" height="76" viewBox="0 0 76 76">
                      <circle cx="38" cy="38" r="33" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5" />
                      <circle cx="38" cy="38" r="33" fill="none" stroke={tc} strokeWidth="5"
                        strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
                        style={{ transition: "stroke-dashoffset .9s linear" }} />
                    </svg>
                    <div className="timer-num">{timeLeft}</div>
                  </div>
                </div>
                <div className="question">¿ {q.a} &nbsp;vs&nbsp; {q.b} ?</div>
                <div className="choices">
                  <button className={`choice${vote === "a" ? " sel" : ""}`} onClick={() => doVote("a")}>{q.a}</button>
                  <button className={`choice${vote === "b" ? " sel" : ""}`} onClick={() => doVote("b")}>{q.b}</button>
                </div>
                {phase === "active_v" ? (
                  <div className="bar-wrap">
                    <div className="bar-heads">
                      <span style={{ color: "#4ade80" }}>{q.a} · {pA}%</span>
                      <span style={{ color: "#60a5fa" }}>{q.b} · {100 - pA}%</span>
                    </div>
                    <div className="bar-track"><div className="bar-a" style={{ width: `${pA}%` }}></div></div>
                    <div className="bar-total">{tot} jugadores en esta ronda</div>
                  </div>
                ) : (
                  <div className="hidden-bar">🔒 Barra oculta — ¿cambias de opinión?</div>
                )}
              </div>
            )}
            {phase === "result" && res && q && (
              <div className="result">
                <div className={`verdict ${res.tie ? "tie" : res.win ? "win" : "lose"}`}>
                  {res.tie ? "EMPATE" : res.win ? "¡GANASTE!" : "PERDISTE"}
                </div>
                <div className="verdict-sub">
                  {res.tie ? "Mismo número de votos en ambos lados"
                    : res.win ? `Estabas en la minoría (${res.pv === "a" ? q.a : q.b})`
                    : `Estabas en la mayoría (${res.pv === "a" ? q.a : q.b})`}
                </div>
                <div className={`token-delta ${res.delta >= 0 ? "p" : "n"}`}>
                  {res.delta > 0 ? "+" : ""}{res.delta.toLocaleString()} 🪙
                </div>
                <div className="bar-wrap" style={{ maxWidth: 480, margin: "0 auto 8px" }}>
                  <div className="bar-heads">
                    <span style={{ color: "#4ade80" }}>{q.a} · {Math.round(res.cA / (res.cA + res.cB) * 100)}%</span>
                    <span style={{ color: "#60a5fa" }}>{q.b} · {Math.round(res.cB / (res.cA + res.cB) * 100)}%</span>
                  </div>
                  <div className="bar-track">
                    <div className="bar-a" style={{ width: `${Math.round(res.cA / (res.cA + res.cB) * 100)}%` }}></div>
                  </div>
                  <div className="bar-total">
                    Minoría: {res.minority === "tie" ? "Empate" : res.minority === "a" ? q.a : q.b}
                    &nbsp;·&nbsp;{res.cA + res.cB} jugadores
                  </div>
                </div>
                <div className="result-btns">
                  <button className="r-btn" onClick={() => { clrTimers(); enterRoom(room); }}>JUGAR DE NUEVO</button>
                  <button className="r-btn" onClick={() => { clrTimers(); setScreen("lobby"); }}>CAMBIAR SALA</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
