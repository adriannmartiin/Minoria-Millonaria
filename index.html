// ── SOUND SYSTEM ─────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function getACtx() { if (!_actx) _actx = new AudioCtx(); return _actx; }

function playTone(freq, type, duration, vol = 0.3, delay = 0) {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t); osc.stop(t + duration);
  } catch(e) {}
}

.notok-room{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s}

.empty-hist{text-align:center;padding:24px;color:rgba(255,255,255,.2);font-size:.85rem;letter-spacing:.1em}
`;

function App() {
  const [screen, setScreen]   = useState("auth");
  const [mode, setMode]       = useState("register");
  const [form, setForm]       = useState({ name: "", email: "", pw: "" });
  const [err, setErr]         = useState("");
  const [msg, setMsg]         = useState("");
  const [busy, setBusy]       = useState(false);
  const [user, setUser]       = useState(null);
  const [userEmail, setEmail] = useState("");

  // Cookie banner
  const [showCookie, setShowCookie] = useState(() => !localStorage.getItem("mm_cookie_ok"));
  // Welcome modal
  const [showWelcome, setShowWelcome] = useState(false);
  // Daily bonus
  const [showBonus, setShowBonus] = useState(false);
  const [bonusAmount, setBonusAmount] = useState(0);
  const [bonusDay, setBonusDay] = useState(0);
  const [bonusDayIdx, setBonusDayIdx] = useState(0);
  // Streak
  const [streak, setStreak] = useState(0);
  // Ranking
  const [ranking, setRanking] = useState([]);
  // Vote flash
  const [voteFlash, setVoteFlash] = useState(null);
  // Tournaments
  const [tournaments, setTournaments] = useState([]);
  const [myEntries, setMyEntries] = useState([]);
  const [tz, setTz] = useState("Europe/Madrid");
  // Notifications
  const [showNotif, setShowNotif] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [unreadNotif, setUnreadNotif] = useState(false);
  // Referral
  const [refCode, setRefCode] = useState("");
  const [refCopied, setRefCopied] = useState(false);
  const [regRefCode, setRegRefCode] = useState("");
  // Room stats (players + timer per room)
  const [roomStats, setRoomStats] = useState({});
  const roomStatsRef = useRef(null);

  // Game
  const [room, setRoom]       = useState(null);
  const [roundData, setRound] = useState(null);
  const [vote, setVote]       = useState(null);
  const [voteCounts, setVC]   = useState({ a: 0, b: 0 });
  const [phase, setPhase]     = useState("waiting");
  const [timeLeft, setTL]     = useState(0);
  const [result, setResult]   = useState(null);
  const [nextIn, setNextIn]   = useState(0);

  // Profile
  const [history, setHistory]   = useState([]);
  const [pwForm, setPwForm]     = useState({ pw1: "", pw2: "" });
  const [pwErr, setPwErr]       = useState("");
  const [pwOk, setPwOk]         = useState("");
  const [pwBusy, setPwBusy]     = useState(false);

  const tokenRef    = useRef("");
  const userIdRef   = useRef("");
  const tokRef      = useRef(0);
  const voteRef     = useRef(null);
  const roundRef    = useRef(null);
  const pollRef     = useRef(null);
  const resultSaved = useRef(false);

  async function loadRoomStats() {
    try {
      const rooms = await dbGet("game_rooms", "select=room_id,started_at,round_id", KEY);
      const votes = await dbGet("round_votes", "select=room_id,round_id", KEY);
      const stats = {};
      ROOMS.forEach(r => {
        const row = rooms && rooms.find(x => x.room_id === r.id);
        const elapsed = row ? (Date.now() - new Date(row.started_at).getTime()) / 1000 : null;
        const nextIn = elapsed !== null ? Math.max(0, Math.ceil(ROUND_TOTAL - elapsed)) : null;
        const players = votes ? votes.filter(v => v.room_id === r.id && row && v.round_id === row.round_id).length : 0;
        stats[r.id] = { players, nextIn, active: players > 0 };
      });
      setRoomStats(stats);
    } catch(e) {}
  }

  useEffect(() => {
    if (screen === "lobby") {
      loadRoomStats();
      roomStatsRef.current = setInterval(loadRoomStats, 5000);
    } else {
      clearInterval(roomStatsRef.current);
    }
    return () => clearInterval(roomStatsRef.current);
  }, [screen]);

  async function checkDailyBonus(profile, userId, token) {
    const today = new Date().toISOString().split("T")[0];
    if (profile.last_bonus_date === today) return;
    const day = profile.last_bonus_date ? (profile.bonus_day || 0) : 0;
    const nextDay = (day % 7);
    const amount = DAILY_BONUS[nextDay];
    const newToks = (profile.tokens || 0) + amount;
    await dbUpdate("profiles", `id=eq.${userId}`,
      { tokens: newToks, last_bonus_date: today, bonus_day: nextDay + 1 }, token);
    tokRef.current = newToks;
    setUser(u => ({ ...u, tokens: newToks }));
    setBonusAmount(amount);
    setBonusDay(nextDay + 1);
    setBonusDayIdx(nextDay);
    setShowBonus(true);
    soundBonus();
  }

  async function loadRanking() {
    const data = await dbGet("profiles",
      "order=win_streak.desc&limit=10&select=username,win_streak,streak_tokens,tokens", KEY);
    setRanking(Array.isArray(data) ? data : []);
    setScreen("ranking");
  }

  // ── TOURNAMENTS / REFERRAL / NOTIFICATIONS ───────────────────────────────
  async function loadTournaments() {
    const data = await dbGet("tournaments", "order=starts_at.asc", KEY);
    const tourns = Array.isArray(data) ? data : [];
    setTournaments(tourns);
    if (userIdRef.current) {
      const entries = await dbGet("tournament_entries", `user_id=eq.${userIdRef.current}`, tokenRef.current);
      setMyEntries(Array.isArray(entries) ? entries.map(e => e.tournament_id) : []);
    }
    buildNotifications(tourns);
    setScreen("tournaments");
  }

  async function joinTournament(t) {
    if (tokRef.current < t.entry_cost) return;
    await dbInsertRaw("tournament_entries", { tournament_id: t.id, user_id: userIdRef.current }, tokenRef.current);
    await saveTok(tokRef.current - t.entry_cost);
    setMyEntries(prev => [...prev, t.id]);
    soundBonus();
  }

  function buildNotifications(tourns) {
    const notifs = [];
    tourns.forEach(t => {
      const diff = new Date(t.starts_at) - Date.now();
      const hours = Math.floor(diff / 3600000);
      if (diff > 0 && hours < 48) {
        notifs.push({ id: t.id, title: `🏆 ${t.title}`, sub: `Empieza en ${hours < 1 ? "menos de 1h" : hours + "h"} · Premio: ${t.prize?.toLocaleString()} tokens`, unread: true });
      }
    });
    notifs.push({ id: "bonus", title: "🎁 Bonus diario disponible", sub: "Entra cada día para conseguir tokens gratis", unread: false });
    setNotifications(notifs);
    setUnreadNotif(notifs.some(n => n.unread));
  }

  async function loadProfile() {
    const hist = await dbGet("match_history", `user_id=eq.${userIdRef.current}&order=created_at.desc&limit=20`, tokenRef.current);
    setHistory(Array.isArray(hist) ? hist : []);
    const prof = await dbGet("profiles", `id=eq.${userIdRef.current}`, tokenRef.current);
    if (prof && prof[0]) setRefCode(prof[0].referral_code || "");
    setScreen("profile");
  }

  function copyRefLink() {
    const link = `${window.location.origin}?ref=${refCode}`;
    navigator.clipboard?.writeText(link).catch(() => {});
    setRefCopied(true);
    setTimeout(() => setRefCopied(false), 2000);
  }

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    if (ref) { setRegRefCode(ref); localStorage.setItem("mm_ref", ref); }
    else { const stored = localStorage.getItem("mm_ref"); if (stored) setRegRefCode(stored); }
  }, []);

  async function applyReferral(newUserId) {
    const code = regRefCode || localStorage.getItem("mm_ref");
    if (!code) return;
    const referrers = await dbGet("profiles", `referral_code=eq.${code}&select=id,tokens`, KEY);
    if (!referrers || !referrers[0] || referrers[0].id === newUserId) return;
    const referrerId = referrers[0].id;
    await dbInsertRaw("referrals", { referrer_id: referrerId, referred_id: newUserId, bonus_paid: true }, KEY);
    await dbUpdate("profiles", `id=eq.${referrerId}`, { tokens: (referrers[0].tokens || 0) + 500 }, KEY);
    localStorage.removeItem("mm_ref");
  }

  const TIMEZONES = [
    { label: "España (CET)", tz: "Europe/Madrid" },
    { label: "UK (GMT)", tz: "Europe/London" },
    { label: "Nueva York (ET)", tz: "America/New_York" },
    { label: "México (CT)", tz: "America/Mexico_City" },
    { label: "Buenos Aires (ART)", tz: "America/Argentina/Buenos_Aires" },
    { label: "Bogotá (COT)", tz: "America/Bogota" },
    { label: "Dubai (GST)", tz: "Asia/Dubai" },
    { label: "Tokio (JST)", tz: "Asia/Tokyo" },
  ];

  function formatTZ(isoDate, tzName) {
    try {
      return new Date(isoDate).toLocaleString("es-ES", { timeZone: tzName, day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
    } catch(e) { return isoDate; }
  }

  // ── AUTH ──────────────────────────────────────────────────────────────────
  async function doRegister() {
    setErr(""); setMsg("");
    const { name, email, pw } = form;
    if (!name.trim() || !email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    if (!email.includes("@")) { setErr("Correo no válido"); return; }
    if (pw.length < 6) { setErr("Mínimo 6 caracteres"); return; }
    setBusy(true);
    try {
      const data = await authCall("signup", { email, password: pw });
      if (data.error) { setErr(data.error_description || data.error); setBusy(false); return; }
      if (data.access_token) {
        tokenRef.current = data.access_token;
        userIdRef.current = data.user.id;
        await dbInsertRaw("profiles", { id: data.user.id, username: name, tokens: regRefCode ? 1500 : 1000 }, data.access_token);
        tokRef.current = regRefCode ? 1500 : 1000;
        setEmail(email);
        setUser({ name, tokens: regRefCode ? 1500 : 1000 });
        setShowWelcome(true);
        applyReferral(data.user.id);
        setScreen("lobby");
      } else {
        setMsg("✅ Revisa tu correo para confirmar la cuenta");
      }
    } catch(e) { setErr("Error de conexión"); }
    setBusy(false);
  }

  async function doLogin() {
    setErr(""); setMsg("");
    const { email, pw } = form;
    if (!email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    setBusy(true);
    try {
      const data = await authCall("token?grant_type=password", { email, password: pw });
      if (data.error || !data.access_token) { setErr("Correo o contraseña incorrectos"); setBusy(false); return; }
      tokenRef.current = data.access_token;
      userIdRef.current = data.user.id;
      const profiles = await dbGet("profiles", `id=eq.${data.user.id}`, data.access_token);
      if (profiles && profiles[0]) {
        tokRef.current = profiles[0].tokens;
        setEmail(email);
        setUser({ name: profiles[0].username, tokens: profiles[0].tokens });
        setStreak(profiles[0].win_streak || 0);
        checkDailyBonus(profiles[0], data.user.id, data.access_token);
        setScreen("lobby");
      } else {
        setErr("Perfil no encontrado");
      }
    } catch(e) { setErr("Error de conexión"); }
    setBusy(false);
  }

  function doLogout() {
    stopGame();
    tokenRef.current = "";
    setUser(null);
    setEmail("");
    setScreen("auth");
  }

  async function saveTok(n) {
    tokRef.current = n;
    setUser(u => ({ ...u, tokens: n }));
    await dbUpdate("profiles", `id=eq.${userIdRef.current}`, { tokens: n }, tokenRef.current);
  }

  // ── PROFILE ───────────────────────────────────────────────────────────────
  async function loadProfile() {
    const hist = await dbGet("match_history", `user_id=eq.${userIdRef.current}&order=created_at.desc&limit=20`, tokenRef.current);
    setHistory(Array.isArray(hist) ? hist : []);
    setScreen("profile");
  }

  async function changePassword() {
    setPwErr(""); setPwOk("");
    if (!pwForm.pw1 || !pwForm.pw2) { setPwErr("Completa los dos campos"); return; }
    if (pwForm.pw1 !== pwForm.pw2) { setPwErr("Las contraseñas no coinciden"); return; }
    if (pwForm.pw1.length < 6) { setPwErr("Mínimo 6 caracteres"); return; }
    setPwBusy(true);
    try {
      const data = await authPut("user", { password: pwForm.pw1 }, tokenRef.current);
      if (data.error) { setPwErr(data.error_description || data.error); }
      else { setPwOk("✅ Contraseña actualizada"); setPwForm({ pw1: "", pw2: "" }); }
    } catch(e) { setPwErr("Error de conexión"); }
    setPwBusy(false);
  }

  // Stats from history
  const stats = {
    total:   history.length,
    wins:    history.filter(h => h.result === "win").length,
    losses:  history.filter(h => h.result === "lose").length,
    ties:    history.filter(h => h.result === "tie").length,
    winPct:  history.length ? Math.round(history.filter(h => h.result === "win").length / history.length * 100) : 0,
    earned:  history.reduce((s, h) => s + (h.delta > 0 ? h.delta : 0), 0),
  };

  // No-tokens screen
  const [noTokRoom, setNoTokRoom] = useState(null);
  const [adCountdown, setAdCountdown] = useState(0);
  const [adWatched, setAdWatched] = useState(false);
  const adRef = useRef(null);

  function watchAd() {
    setAdCountdown(5);
    setAdWatched(false);
    adRef.current = setInterval(() => {
      setAdCountdown(prev => {
        if (prev <= 1) {
          clearInterval(adRef.current);
          setAdWatched(true);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
  }

  async function claimAdTokens() {
    const newTok = tokRef.current + 100;
    await saveTok(newTok);
    setAdWatched(false);
    setAdCountdown(0);
  }
  function stopGame() {
    clearInterval(pollRef.current);
    setRoom(null); setRound(null); setVote(null);
    voteRef.current = null; roundRef.current = null;
    resultSaved.current = false;
    setPhase("waiting"); setResult(null); setVC({ a: 0, b: 0 });
  }

  async function enterRoom(r) {
    if (tokRef.current < r.cost) {
      setNoTokRoom(r);
      setAdWatched(false);
      setAdCountdown(0);
      setScreen("notokens");
      return;
    }
    stopGame();
    setRoom(r); setScreen("game"); setPhase("waiting");
    await pollRound(r);
    pollRef.current = setInterval(() => pollRound(r), 1000);
  }

  async function pollRound(r) {
    try {
      const rows = await dbGet("game_rooms", `room_id=eq.${r.id}`, tokenRef.current);
      const row = rows && rows[0];
      if (!row) { await startNewRound(r); return; }
      const elapsed = (Date.now() - new Date(row.started_at).getTime()) / 1000;
      if (elapsed >= ROUND_TOTAL) { await startNewRound(r); return; }

      // Si es una ronda nueva (round_id distinto), resetear voto
      if (roundRef.current && roundRef.current.round_id !== row.round_id) {
        voteRef.current = null;
        setVote(null);
        setResult(null);
        resultSaved.current = false;
      }

      roundRef.current = row; setRound(row);
      const votes = await dbGet("round_votes", `round_id=eq.${row.round_id}`, tokenRef.current);
      const cA = votes ? votes.filter(v => v.vote === "a").length : 0;
      const cB = votes ? votes.filter(v => v.vote === "b").length : 0;
      setVC({ a: cA, b: cB });

      if (elapsed < VOTE_VISIBLE) {
        const tl = Math.ceil(VOTE_VISIBLE - elapsed);
        if (tl <= 3) soundTick();
        setPhase("voting"); setTL(tl);
      } else if (elapsed < VOTE_VISIBLE + VOTE_HIDDEN) {
        const tl = Math.ceil(VOTE_VISIBLE + VOTE_HIDDEN - elapsed);
        if (tl <= 3) soundTick();
        setPhase("hidden"); setTL(tl);
      } else {
        setPhase("result");
        setNextIn(Math.ceil(ROUND_TOTAL - elapsed));
        // Solo calcular resultado si el jugador votó en esta ronda
        if (!resultSaved.current && voteRef.current !== null) {
          resultSaved.current = true;
          computeResult(r, row, cA, cB);
        } else if (!resultSaved.current && voteRef.current === null) {
          resultSaved.current = true;
          setResult({ noVote: true, cA, cB, q: { a: row.question_a, b: row.question_b } });
        }
      }
    } catch(e) { console.error(e); }
  }

  async function startNewRound(r) {
    const q = rand(QUESTIONS);
    resultSaved.current = false;
    voteRef.current = null; setVote(null); setResult(null); setVC({ a: 0, b: 0 });
    await dbUpsert("game_rooms", {
      room_id: r.id,
      round_id: (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)),
      question_a: q.a, question_b: q.b,
      started_at: new Date().toISOString(),
      votes_a: 0, votes_b: 0, phase: "voting"
    }, "room_id", tokenRef.current);
  }

  async function castVote(v) {
    if (!roundRef.current) return;
    const elapsed = (Date.now() - new Date(roundRef.current.started_at).getTime()) / 1000;
    if (elapsed >= VOTE_VISIBLE + VOTE_HIDDEN) return;
    voteRef.current = v; setVote(v);
    setVoteFlash(v);
    setTimeout(() => setVoteFlash(null), 300);
    soundVote();
    await dbUpsert("round_votes", {
      round_id: roundRef.current.round_id,
      user_id: userIdRef.current,
      vote: v,
      room_id: roundRef.current.room_id
    }, "round_id,user_id", tokenRef.current);
  }

  async function computeResult(r, row, cA, cB) {
    const myVote = voteRef.current;
    const total = cA + cB;
    let minority = "tie";
    if (cA < cB) minority = "a";
    else if (cB < cA) minority = "b";
    let delta = 0, win = false, tie = minority === "tie";
    let resultStr = myVote === null ? "no_vote" : "lose";

    if (myVote !== null) {
      if (tie) {
        delta = 0; resultStr = "tie";
      } else {
        const minC = minority === "a" ? cA : cB;
        const prizePool = Math.floor(total * r.cost * 0.90);
        if (myVote === minority) {
          win = true; resultStr = "win";
          delta = Math.floor(prizePool / minC) - r.cost;
        } else {
          delta = -r.cost; resultStr = "lose";
        }
      }
    }

    const newTok = Math.max(0, tokRef.current + delta);

    // Streak tracking
    let newStreak = streak;
    let newMaxStreak = 0;
    let newStreakTokens = 0;
    if (resultStr === "win") {
      newStreak = streak + 1;
      soundWin();
    } else if (resultStr === "lose") {
      newStreak = 0;
      soundLose();
    }
    setStreak(newStreak);

    // Update profile with tokens + streak
    const profileUpdate = { tokens: newTok, win_streak: newStreak };
    if (resultStr === "win") {
      profileUpdate.streak_tokens = delta;
    } else if (resultStr === "lose") {
      profileUpdate.streak_tokens = 0;
    }
    tokRef.current = newTok;
    setUser(u => ({ ...u, tokens: newTok }));
    await dbUpdate("profiles", `id=eq.${userIdRef.current}`, profileUpdate, tokenRef.current);

    setResult({ win, tie, delta, cA, cB, minority, myVote, noVote: myVote === null, q: { a: row.question_a, b: row.question_b }, streak: newStreak });

    // Save to history
    if (myVote !== null) {
      await dbInsertRaw("match_history", {
        user_id: userIdRef.current,
        room_id: r.id,
        round_id: row.round_id,
        vote: myVote,
        result: resultStr,
        delta,
        tokens_after: newTok,
        question_a: row.question_a,
        question_b: row.question_b,
        minority,
        votes_a: cA,
        votes_b: cB
      }, tokenRef.current);
    }
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  const tot = voteCounts.a + voteCounts.b;
  const pA  = tot > 0 ? Math.round((voteCounts.a / tot) * 100) : 50;
  const C   = 2 * Math.PI * 33;
  const TT  = phase === "voting" ? VOTE_VISIBLE : VOTE_HIDDEN;
  const off = C - (Math.min(timeLeft, TT) / TT) * C;
  const tc  = phase === "voting" ? "#fbbf24" : "#c084fc";

  const roomName = r => ROOMS.find(x => x.id === r)?.name || r;
  const roomColor = r => ROOMS.find(x => x.id === r)?.color || "#fff";

  return (
    <div className="app">
      <style>{CSS}</style>

      {/* ── AUTH ── */}
      {screen === "auth" && (
        <div className="auth">
          <div className="logo-main">MINORÍA<br/>MILLONARIA</div>
          <div className="logo-sub">La minoría siempre gana</div>
          <div className="auth-card">
            <div className="auth-heading">{mode === "register" ? "CREAR CUENTA" : "INICIAR SESIÓN"}</div>
            {err && <div className="err">{err}</div>}
            {msg && <div className="ok">{msg}</div>}
            <div>
              {mode === "register" && (
                <div className="field">
                  <label>Nombre de usuario</label>
                  <input type="text" placeholder="Tu alias..." value={form.name}
                    onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
                </div>
              )}
              <div className="field">
                <label>Correo electrónico</label>
                <input type="email" placeholder="tu@correo.com" value={form.email}
                  onChange={e => setForm(f => ({ ...f, email: e.target.value }))} />
              </div>
              <div className="field">
                <label>Contraseña</label>
                <input type="password" placeholder="••••••••" value={form.pw}
                  onChange={e => setForm(f => ({ ...f, pw: e.target.value }))} />
              </div>
              {mode === "register" && (
                <div className="field">
                  <label>Código de invitación <span style={{color:"rgba(255,255,255,.25)",fontWeight:400}}>(opcional)</span></label>
                  <input type="text" placeholder="Código de amigo..." value={regRefCode}
                    onChange={e => setRegRefCode(e.target.value)} />
                </div>
              )}
                {busy ? "CARGANDO..." : mode === "register" ? <span>REGISTRARSE · 1000 {COIN} GRATIS</span> : "ENTRAR AL JUEGO"}
              </button>
            </div>
            <div className="auth-switch">
              {mode === "register"
                ? <span>¿Ya tienes cuenta? <span style={{color:"#fbbf24",cursor:"pointer",fontWeight:700}} onClick={() => { setMode("login"); setErr(""); setMsg(""); }}>Inicia sesión</span></span>
                : <span>¿Sin cuenta? <span style={{color:"#fbbf24",cursor:"pointer",fontWeight:700}} onClick={() => { setMode("register"); setErr(""); setMsg(""); }}>Regístrate</span></span>}
            </div>
          </div>
        </div>
      )}

      {/* ── LOBBY ── */}
      {screen === "lobby" && (
        <div className="lobby">
          <div className="topbar">
            <div className="topbar-logo">MINORÍA MILLONARIA</div>
            <div className="topbar-right">
              <div className="token-pill">{COIN} {user?.tokens?.toLocaleString()}</div>
              <button className="ghost-btn" onClick={() => { loadTournaments(); }}>🏆 Torneos</button>
              <button className="ghost-btn" style={{position:"relative"}} onClick={() => setShowNotif(v => !v)}>
                🔔{unreadNotif && <span className="notif-dot"></span>}
              </button>
              <button className="ghost-btn" onClick={loadRanking}>📊 Ranking</button>
              <button className="ghost-btn" onClick={loadProfile}>👤 Perfil</button>
              <button className="ghost-btn" onClick={doLogout}>Salir</button>
            </div>
          </div>
          {showNotif && (
            <div className="notif-panel">
              <div className="notif-hdr">NOTIFICACIONES</div>
              {notifications.length === 0 && <div style={{padding:"20px",color:"rgba(255,255,255,.25)",fontSize:".85rem",textAlign:"center"}}>Sin notificaciones</div>}
              {notifications.map(n => (
                <div key={n.id} className={`notif-item${n.unread?" unread":""}`} onClick={() => { setShowNotif(false); if(n.id !== "bonus") loadTournaments(); }}>
                  <div className="notif-item-title">{n.title}</div>
                  <div className="notif-item-sub">{n.sub}</div>
                </div>
              ))}
            </div>
          )}
          <div className="lobby-hero">
            <div className="lobby-title">ELIGE TU SALA</div>
            <div className="lobby-hint">Hola {user?.name} · Sé parte de la minoría</div>
          </div>
          <div className="rooms">
            {ROOMS.map(r => (
              <div key={r.id}
                className="room-card"
                style={{ border: `1px solid ${r.color}33`, boxShadow: user?.tokens >= r.cost ? r.glow : "none", opacity: user?.tokens < r.cost ? 0.5 : 1 }}
                onClick={() => enterRoom(r)}>
                <span className="room-icon">{r.icon}</span>
                <div className="room-name" style={{ color: r.color }}>{r.name}</div>
                <div className="room-desc">{r.desc}</div>
                <div className="room-bet">Apuesta: <em style={{ color: r.color }}>{r.cost.toLocaleString()} {COIN}</em></div>
                {roomStats[r.id] && (
                  <div className={`room-players${roomStats[r.id].active ? " active" : ""}`}>
                    {roomStats[r.id].active ? `👥 ${roomStats[r.id].players} jugando` : "⏳ Sin jugadores"}
                  </div>
                )}
                {roomStats[r.id]?.nextIn > 0 && (
                  <div className="room-timer">🔄 Nueva ronda en {roomStats[r.id].nextIn}s</div>
                )}
              </div>
            ))}
          </div>
          <div className="footer-links" style={{marginTop:40}}>
            <span className="footer-link" onClick={() => setScreen("terms")}>Términos y Condiciones</span>
            <span className="footer-link" onClick={() => setScreen("privacy")}>Política de Privacidad</span>
          </div>
        </div>
      )}
      {screen === "game" && room && (
        <div className="game">
          <div className="game-hdr">
            <button className="ghost-btn" onClick={() => { stopGame(); setScreen("lobby"); }}>← Lobby</button>
            <div className="token-pill" style={{ color: room.color, borderColor: room.color + "44", background: room.color + "12" }}>
              {room.icon} {room.name} · {room.cost.toLocaleString()} {COIN}
            </div>
            <div className="token-pill">{COIN} {user?.tokens?.toLocaleString()}</div>
          </div>
          <div className="game-card">
            {phase === "waiting" && (
              <div className="waiting">
                <div className="dots"><div className="dot"></div><div className="dot"></div><div className="dot"></div></div>
                <div className="wait-txt">Conectando a la sala...</div>
              </div>
            )}
            {(phase === "voting" || phase === "hidden") && roundData && (
              <div>
                <div className="phase-tag">{phase === "voting" ? "⚡ Votación en directo" : "🔒 Barra oculta · Última oportunidad"}</div>
                <div className="timer-wrap">
                  <div className="timer-ring">
                    <svg width="76" height="76" viewBox="0 0 76 76">
                      <circle cx="38" cy="38" r="33" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5" />
                      <circle cx="38" cy="38" r="33" fill="none" stroke={tc} strokeWidth="5"
                        strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
                        style={{ transition: "stroke-dashoffset .95s linear" }} />
                    </svg>
                    <div className="timer-num">{timeLeft}</div>
                  </div>
                </div>
                <div className="question">¿ {roundData.question_a} &nbsp;vs&nbsp; {roundData.question_b} ?</div>
                {streak >= 2 && (
                  <div className="streak-bar">
                    <span className="streak-fire">🔥</span>
                    <span className="streak-txt">RACHA: {streak} VICTORIAS SEGUIDAS</span>
                  </div>
                )}
                <div className="choices">
                  <button className={`choice${vote === "a" ? " sel" : ""}${voteFlash === "a" ? " flash" : ""}`} onClick={() => castVote("a")}>{roundData.question_a}</button>
                  <button className={`choice${vote === "b" ? " sel" : ""}${voteFlash === "b" ? " flash" : ""}`} onClick={() => castVote("b")}>{roundData.question_b}</button>
                </div>
                {vote === null && <div style={{textAlign:"center",fontSize:".78rem",color:"rgba(255,255,255,.25)",letterSpacing:".15em",marginBottom:12}}>TAP PARA VOTAR</div>}
                {phase === "voting" ? (
                  <div className="bar-wrap">
                    <div className="bar-heads">
                      <span style={{color:"#4ade80"}}>{roundData.question_a} · {pA}%</span>
                      <span style={{color:"#60a5fa"}}>{roundData.question_b} · {100-pA}%</span>
                    </div>
                    <div className="bar-track"><div className="bar-a" style={{width:`${pA}%`}}></div></div>
                    <div className="bar-total">{tot} votos en esta ronda</div>
                  </div>
                ) : (
                  <div className="hidden-bar">🔒 Barra oculta — ¿te mantienes?</div>
                )}
              </div>
            )}
            {phase === "result" && result && roundData && (
              <div className="result">
                {result.win && (
                  <div className="confetti-wrap">
                    {[...Array(12)].map((_, i) => (
                      <div key={i} className="confetti-piece" style={{
                        left: `${(i * 8.5) % 100}%`,
                        background: ["#fbbf24","#4ade80","#60a5fa","#c084fc","#f97316"][i % 5],
                        animationDelay: `${i * 0.08}s`,
                        animationDuration: `${0.9 + (i % 3) * 0.2}s`
                      }} />
                    ))}
                  </div>
                )}
                {result.noVote ? (
                  <>
                    <div className="verdict tie">SIN VOTO</div>
                    <div className="verdict-sub">No votaste a tiempo</div>
                    <div className="token-delta z">±0 {COIN}</div>
                  </>
                ) : (
                  <>
                    <div className={`verdict win-anim ${result.tie ? "tie" : result.win ? "win" : "lose"}`}>
                      {result.tie ? "EMPATE" : result.win ? "¡GANASTE!" : "PERDISTE"}
                    </div>
                    <div className="verdict-sub">
                      {result.tie ? "Mismo número de votos — se devuelve todo"
                        : result.win ? `Minoría: ${result.myVote === "a" ? result.q.a : result.q.b}`
                        : `Mayoría: ${result.myVote === "a" ? result.q.a : result.q.b}`}
                    </div>
                    <div className={`token-delta ${result.delta > 0 ? "p" : result.delta < 0 ? "n" : "z"}${result.win ? " coin-glow" : ""}`}>
                      {result.delta > 0 ? "+" : ""}{result.delta.toLocaleString()} {COIN}
                    </div>
                    {result.win && result.streak >= 2 && (
                      <div className="streak-bar" style={{marginTop:8}}>
                        <span className="streak-fire">🔥</span>
                        <span className="streak-txt">¡RACHA DE {result.streak}!</span>
                      </div>
                    )}
                  </>
                )}
                <div className="bar-wrap" style={{maxWidth:480,margin:"0 auto 8px"}}>
                  <div className="bar-heads">
                    <span style={{color:"#4ade80"}}>{roundData.question_a} · {Math.round((result.cA||0)/Math.max((result.cA||0)+(result.cB||0),1)*100)}%</span>
                    <span style={{color:"#60a5fa"}}>{roundData.question_b} · {Math.round((result.cB||0)/Math.max((result.cA||0)+(result.cB||0),1)*100)}%</span>
                  </div>
                  <div className="bar-track"><div className="bar-a" style={{width:`${Math.round((result.cA||0)/Math.max((result.cA||0)+(result.cB||0),1)*100)}%`}}></div></div>
                  <div className="bar-total">{(result.cA||0)+(result.cB||0)} votos totales</div>
                </div>
                <div className="next-round">🔄 Nueva ronda en {nextIn}s...</div>
                <button className="r-btn" onClick={() => { stopGame(); setScreen("lobby"); }}>CAMBIAR SALA</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── PROFILE ── */}
      {screen === "profile" && (
        <div className="profile">
          <div className="topbar">
            <div className="topbar-logo">MI PERFIL</div>
            <div className="topbar-right">
              <div className="token-pill">{COIN} {user?.tokens?.toLocaleString()}</div>
              <button className="ghost-btn" onClick={() => setScreen("lobby")}>← Lobby</button>
            </div>
          </div>

          {/* Avatar + info */}
          <div className="profile-hero">
            <div className="avatar">{user?.name?.[0]?.toUpperCase() || "?"}</div>
            <div>
              <div className="profile-name">{user?.name}</div>
              <div className="profile-email">{userEmail}</div>
              <div style={{marginTop:8,fontSize:".8rem",color:"rgba(255,255,255,.3)",fontWeight:600}}>
                {COIN} {user?.tokens?.toLocaleString()} tokens
              </div>
            </div>
          </div>

          {/* Stats */}
          <div className="section-title">Estadísticas</div>
          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-val">{stats.total}</div>
              <div className="stat-lbl">Partidas</div>
            </div>
            <div className="stat-card">
              <div className="stat-val" style={{color:"#4ade80"}}>{stats.wins}</div>
              <div className="stat-lbl">Victorias</div>
            </div>
            <div className="stat-card">
              <div className="stat-val" style={{color:"#f87171"}}>{stats.losses}</div>
              <div className="stat-lbl">Derrotas</div>
            </div>
            <div className="stat-card">
              <div className="stat-val" style={{color:"#fbbf24"}}>{stats.ties}</div>
              <div className="stat-lbl">Empates</div>
            </div>
            <div className="stat-card">
              <div className="stat-val">{stats.winPct}%</div>
              <div className="stat-lbl">% Victorias</div>
            </div>
            <div className="stat-card">
              <div className="stat-val" style={{color:"#4ade80"}}>+{stats.earned.toLocaleString()}</div>
              <div className="stat-lbl">Ganado total</div>
            </div>
            <div className="stat-card">
              <div className="stat-val" style={{color:"#f97316"}}>{streak} 🔥</div>
              <div className="stat-lbl">Racha actual</div>
            </div>
          </div>

          {/* Token chart */}
          {history.length > 1 && (() => {
            const pts = [...history].reverse().map(h => h.tokens_after).filter(Boolean);
            if (pts.length < 2) return null;
            const min = Math.min(...pts), max = Math.max(...pts);
            const range = max - min || 1;
            const W = 600, H = 80;
            const x = i => (i / (pts.length - 1)) * W;
            const y = v => H - ((v - min) / range) * H;
            const d = pts.map((v,i) => `${i===0?'M':'L'}${x(i)},${y(v)}`).join(' ');
            return (
              <div className="chart-wrap">
                <div className="chart-title">Evolución de tokens</div>
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'70px'}}>
                  <defs>
                    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#fbbf24" stopOpacity="0.3"/>
                      <stop offset="100%" stopColor="#fbbf24" stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  <path d={`${d} L${W},${H} L0,${H} Z`} fill="url(#cg)" />
                  <path d={d} fill="none" stroke="#fbbf24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  <circle cx={x(pts.length-1)} cy={y(pts[pts.length-1])} r="4" fill="#fbbf24"/>
                </svg>
              </div>
            );
          })()}

          {/* History */}
          <div className="section-title">Últimas partidas</div>
          <div className="history-list">
            {history.length === 0 ? (
              <div className="empty-hist">Aún no has jugado ninguna partida</div>
            ) : history.map(h => (
              <div key={h.id} className="history-row">
                <div>
                  <div className="history-q">{h.question_a} vs {h.question_b}</div>
                  <div className="history-room" style={{color: roomColor(h.room_id)}}>{roomName(h.room_id)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className={`history-delta ${h.delta > 0 ? "p" : h.delta < 0 ? "n" : "z"}`}>
                    {h.delta > 0 ? "+" : ""}{h.delta?.toLocaleString()} {COIN}
                  </div>
                  <div style={{fontSize:".72rem",color:"rgba(255,255,255,.25)",marginTop:3}}>
                    {h.result === "win" ? "✅ Victoria" : h.result === "lose" ? "❌ Derrota" : h.result === "tie" ? "🤝 Empate" : "⏭ Sin voto"}
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Referral */}
          <div className="ref-box">
            <div className="ref-title">INVITA AMIGOS · GANA TOKENS</div>
            <div className="ref-link">
              <div className="ref-code">{window.location.origin}?ref={refCode}</div>
              <button className="ref-copy" onClick={copyRefLink}>{refCopied ? "✅ COPIADO" : "COPIAR LINK"}</button>
            </div>
            <div className="ref-info">
              Tu amigo recibe <strong style={{color:"#fbbf24"}}>+500 tokens extra</strong> al registrarse (1.500 total).<br/>
              Tú recibes <strong style={{color:"#4ade80"}}>+500 tokens</strong> cuando se registre.
            </div>
          </div>

          {/* Change password */}
          <div className="pw-section">
            <div className="pw-title">Cambiar contraseña</div>
            {pwErr && <div className="err">{pwErr}</div>}
            {pwOk  && <div className="ok">{pwOk}</div>}
            <div className="pw-row">
              <div className="field">
                <label>Nueva contraseña</label>
                <input type="password" placeholder="••••••••" value={pwForm.pw1}
                  onChange={e => setPwForm(f => ({ ...f, pw1: e.target.value }))} />
              </div>
              <div className="field">
                <label>Repetir contraseña</label>
                <input type="password" placeholder="••••••••" value={pwForm.pw2}
                  onChange={e => setPwForm(f => ({ ...f, pw2: e.target.value }))} />
              </div>
            </div>
            <button className="btn-sm" disabled={pwBusy} onClick={changePassword}>
              {pwBusy ? "GUARDANDO..." : "GUARDAR CONTRASEÑA"}
            </button>
          </div>

          {/* Logout */}
          <button className="logout-btn" onClick={doLogout}>CERRAR SESIÓN</button>
        </div>
      )}
      {/* ── NO TOKENS ── */}
      {screen === "notokens" && noTokRoom && (
        <div className="notok">
          <div className="notok-card">
            <div className="notok-icon"><img src="/coin.png" style={{width:"80px",height:"80px",objectFit:"contain"}} /></div>
            <div className="notok-title">TOKENS INSUFICIENTES</div>
            <div className="notok-sub">Necesitas {noTokRoom.cost.toLocaleString()} tokens para entrar a la sala {noTokRoom.name}</div>
            <div className="notok-bal">Tu saldo: {user?.tokens?.toLocaleString()} {COIN}</div>

            {/* Simulated ad */}
            <div className="ad-box">
              <div className="ad-title">VER ANUNCIO · GANAR 100 {COIN}</div>
              {adCountdown === 0 && !adWatched && (
                <div>
                  <div className="ad-screen">[ ESPACIO PUBLICITARIO ]</div>
                  <button className="btn-gold" onClick={watchAd}>▶ VER ANUNCIO</button>
                </div>
              )}
              {adCountdown > 0 && (
                <div>
                  <div className="ad-screen">[ ANUNCIO EN REPRODUCCIÓN ]</div>
                  <div className="ad-countdown">{adCountdown}s</div>
                  <div className="ad-hint">No cierres esta pantalla...</div>
                </div>
              )}
              {adWatched && (
                <div>
                  <div className="ad-screen" style={{color:"#4ade80",fontSize:"1.2rem"}}>✅ ¡Anuncio completado!</div>
                  <button className="btn-gold" onClick={claimAdTokens}>RECLAMAR +100 {COIN}</button>
                </div>
              )}
            </div>

            {/* Accessible rooms */}
            <div style={{textAlign:"left",marginBottom:10,fontSize:".72rem",letterSpacing:".15em",color:"rgba(255,255,255,.3)",fontWeight:700,textTransform:"uppercase"}}>Salas disponibles con tu saldo</div>
            <div className="notok-rooms">
              {ROOMS.map(r => (
                <div key={r.id}
                  className={`notok-room${tokRef.current < r.cost ? " disabled" : ""}`}
                  onClick={() => { if (tokRef.current >= r.cost) { setScreen("lobby"); enterRoom(r); } }}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:"1.4rem"}}>{r.icon}</span>
                    <div>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".85rem",fontWeight:700,color:r.color}}>{r.name}</div>
                      <div style={{fontSize:".72rem",color:"rgba(255,255,255,.3)"}}>{r.cost.toLocaleString()} {COIN}</div>
                    </div>
                  </div>
                  {tokRef.current >= r.cost
                    ? <span style={{fontSize:".72rem",color:"#4ade80",fontWeight:700,letterSpacing:".1em"}}>ENTRAR →</span>
                    : <span style={{fontSize:".72rem",color:"rgba(255,255,255,.2)",fontWeight:700}}>BLOQUEADA</span>}
                </div>
              ))}
            </div>

            <button className="ghost-btn" style={{width:"100%",textAlign:"center"}} onClick={() => setScreen("lobby")}>← Volver al lobby</button>
          </div>
        </div>
      )}

      {/* ── TERMS ── */}
      {screen === "terms" && (
        <div className="terms">
          <div className="topbar">
            <div className="topbar-logo">TÉRMINOS Y CONDICIONES</div>
            <button className="ghost-btn" onClick={() => setScreen("lobby")}>← Volver</button>
          </div>
          <h2>1. Aceptación de los términos</h2>
          <p>Al acceder y usar Minoría Millonaria aceptas estos términos. Si no estás de acuerdo, no uses el servicio.</p>
          <h2>2. Descripción del servicio</h2>
          <p>Minoría Millonaria es un juego de entretenimiento basado en votaciones en tiempo real. Los tokens son una moneda virtual del juego sin valor monetario directo hasta que se canjeen según las condiciones vigentes.</p>
          <h2>3. Edad mínima</h2>
          <p>Debes tener al menos 18 años para usar este servicio. Al registrarte confirmas que cumples este requisito.</p>
          <h2>4. Tokens y recompensas</h2>
          <p>Los tokens se obtienen jugando, viendo anuncios o mediante compra. La casa retiene un 10% de comisión en cada ronda. Las recompensas están sujetas a disponibilidad y pueden modificarse. En caso de empate se devuelve la apuesta íntegra.</p>
          <h2>5. Conducta del usuario</h2>
          <p>Queda prohibido usar herramientas automáticas, bots o cualquier método que altere el funcionamiento normal del juego. El incumplimiento puede suponer la suspensión de la cuenta.</p>
          <h2>6. Limitación de responsabilidad</h2>
          <p>El servicio se ofrece "tal cual". No garantizamos disponibilidad continua ni nos hacemos responsables de pérdidas derivadas del uso del juego.</p>
          <h2>7. Modificaciones</h2>
          <p>Nos reservamos el derecho a modificar estos términos en cualquier momento. El uso continuado del servicio implica la aceptación de los cambios.</p>
          <h2>8. Contacto</h2>
          <p>Para cualquier consulta puedes contactarnos en: <strong style={{color:"#fbbf24"}}>soporte@minoriamillonaria.com</strong></p>
          <div className="terms-footer">© 2025 Minoría Millonaria. Todos los derechos reservados.</div>
        </div>
      )}

      {/* ── PRIVACY ── */}
      {screen === "privacy" && (
        <div className="terms">
          <div className="topbar">
            <div className="topbar-logo">POLÍTICA DE PRIVACIDAD</div>
            <button className="ghost-btn" onClick={() => setScreen("lobby")}>← Volver</button>
          </div>
          <h2>1. Datos que recopilamos</h2>
          <p>Recopilamos: dirección de correo electrónico, nombre de usuario, historial de partidas y saldo de tokens. No recopilamos datos de pago directamente — estos son gestionados por proveedores externos certificados.</p>
          <h2>2. Uso de los datos</h2>
          <p>Usamos tus datos para gestionar tu cuenta, mostrar tu historial y estadísticas, y mejorar la experiencia del juego. No vendemos tus datos a terceros.</p>
          <h2>3. Anuncios</h2>
          <p>Utilizamos Google AdSense para mostrar anuncios. Google puede usar cookies para personalizar los anuncios según tu actividad. Puedes gestionar tus preferencias en <strong style={{color:"#fbbf24"}}>g.co/adsettings</strong>.</p>
          <h2>4. Cookies</h2>
          <p>Usamos cookies técnicas necesarias para el funcionamiento del juego (sesión de usuario) y cookies de terceros para publicidad. Puedes desactivar las cookies en la configuración de tu navegador.</p>
          <h2>5. Almacenamiento</h2>
          <p>Tus datos se almacenan de forma segura en servidores de Supabase (UE) con cifrado en tránsito y en reposo.</p>
          <h2>6. Tus derechos</h2>
          <p>Tienes derecho a acceder, rectificar o eliminar tus datos en cualquier momento. Para ejercer estos derechos contáctanos en: <strong style={{color:"#fbbf24"}}>soporte@minoriamillonaria.com</strong></p>
          <h2>7. Menores</h2>
          <p>Este servicio no está dirigido a menores de 18 años. No recopilamos conscientemente datos de menores.</p>
          <div className="terms-footer">© 2025 Minoría Millonaria. Todos los derechos reservados.</div>
        </div>
      )}

      {/* ── TOURNAMENTS ── */}
      {screen === "tournaments" && (
        <div className="tourn">
          <div className="topbar">
            <div className="topbar-logo">🏆 TORNEOS</div>
            <div className="topbar-right">
              <div className="token-pill">{COIN} {user?.tokens?.toLocaleString()}</div>
              <button className="ghost-btn" onClick={() => setScreen("lobby")}>← Lobby</button>
            </div>
          </div>
          <div style={{maxWidth:700,margin:"0 auto 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:".78rem",color:"rgba(255,255,255,.35)",fontWeight:600,letterSpacing:".1em"}}>TU ZONA HORARIA:</span>
            <select className="tz-select" value={tz} onChange={e => setTz(e.target.value)}>
              {TIMEZONES.map(t => <option key={t.tz} value={t.tz}>{t.label}</option>)}
            </select>
          </div>
          <div className="tourn-list">
            {tournaments.length === 0 && (
              <div className="tourn-empty">
                <div style={{fontSize:"3rem",marginBottom:16}}>🏆</div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".9rem",color:"rgba(255,255,255,.3)",letterSpacing:".1em"}}>NO HAY TORNEOS PRÓXIMOS</div>
                <div style={{fontSize:".82rem",color:"rgba(255,255,255,.2)",marginTop:8}}>Vuelve pronto para ver los próximos eventos</div>
              </div>
            )}
            {tournaments.map(t => {
              const joined = myEntries.includes(t.id);
              const canJoin = tokRef.current >= t.entry_cost && !joined;
              const entries = t.current_players || 0;
              return (
                <div key={t.id} className="tourn-card">
                  <div className="tourn-title">{t.title}</div>
                  {t.description && <div style={{fontSize:".85rem",color:"rgba(255,255,255,.4)",marginBottom:12}}>{t.description}</div>}
                  <div className="tourn-meta">
                    <span className="tourn-badge date">📅 {formatTZ(t.starts_at, tz)}</span>
                    <span className="tourn-badge prize">🏆 {t.prize?.toLocaleString()} tokens</span>
                    <span className="tourn-badge entry">Entrada: {t.entry_cost} {COIN}</span>
                    <span className="tourn-badge players">👥 {entries}/{t.max_players}</span>
                  </div>
                  <button
                    className={`tourn-btn${joined?" joined":""}`}
                    disabled={!canJoin && !joined}
                    onClick={() => canJoin && joinTournament(t)}>
                    {joined ? "✅ INSCRITO" : tokRef.current < t.entry_cost ? "TOKENS INSUFICIENTES" : "INSCRIBIRSE"}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── RANKING ── */}
      {screen === "ranking" && (
        <div className="ranking">
          <div className="topbar">
            <div className="topbar-logo">🏆 RANKING</div>
            <button className="ghost-btn" onClick={() => setScreen("lobby")}>← Lobby</button>
          </div>
          <div className="section-title" style={{textAlign:"center",marginBottom:20}}>Top jugadores por racha de victorias</div>
          <div className="rank-list">
            {ranking.length === 0 && <div style={{textAlign:"center",color:"rgba(255,255,255,.2)",padding:40}}>Aún no hay datos suficientes</div>}
            {ranking.map((p, i) => (
              <div key={i} className="rank-row">
                <div className={`rank-pos${i===0?" gold":i===1?" silver":i===2?" bronze":""}`}>
                  {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
                </div>
                <div className="rank-name">{p.username}</div>
                <div className="rank-streak">🔥 {p.win_streak || 0} racha</div>
                <div className="rank-tokens">+{(p.streak_tokens || 0).toLocaleString()} {COIN}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── DAILY BONUS MODAL ── */}
      {showBonus && (
        <div className="modal-overlay">
          <div className="modal-card">
            <div className="modal-icon">🎁</div>
            <div className="modal-title">¡BONUS DIARIO!</div>
            <div className="modal-text">Has recibido tu recompensa del día {bonusDay}</div>
            <div className="bonus-days">
              {DAILY_BONUS.map((amt, i) => (
                <div key={i} className={`bonus-day${i < bonusDayIdx ? " done" : i === bonusDayIdx ? " today" : " locked"}`}>
                  <div className="bonus-day-num">Día {i+1}</div>
                  <div className="bonus-day-val">{i < bonusDayIdx ? "✅" : `+${amt}`}</div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"2rem",fontWeight:900,color:"#4ade80",margin:"16px 0"}}>
              +{bonusAmount} {COIN}
            </div>
            <button className="btn-gold" onClick={() => setShowBonus(false)}>¡GENIAL!</button>
          </div>
        </div>
      )}

      {/* ── COOKIE BANNER ── */}
      {showCookie && (
        <div className="cookie-banner">
          <div className="cookie-text">
            Usamos cookies para mejorar tu experiencia y mostrar anuncios personalizados.
            Consulta nuestra <span onClick={() => setScreen("privacy")}>Política de Privacidad</span>.
          </div>
          <div className="cookie-btns">
            <button className="cookie-reject" onClick={() => { localStorage.setItem("mm_cookie_ok","reject"); setShowCookie(false); }}>Rechazar</button>
            <button className="cookie-accept" onClick={() => { localStorage.setItem("mm_cookie_ok","accept"); setShowCookie(false); }}>Aceptar</button>
          </div>
        </div>
      )}

      {/* ── WELCOME MODAL ── */}
      {showWelcome && (
        <div className="modal-overlay">
          <div className="modal-card">
            <div className="modal-icon">👑</div>
            <div className="modal-title">¡BIENVENIDO A MINORÍA MILLONARIA!</div>
            <div className="modal-text">El juego donde la minoría siempre gana. Tienes <strong style={{color:"#fbbf24"}}>1.000 tokens</strong> para empezar.</div>
            <div className="modal-rules">
              <div className="modal-rule"><span>⚡</span><span>Cada ronda dura 15 segundos. Elige una opción.</span></div>
              <div className="modal-rule"><span>📊</span><span>Los primeros 10s ves cómo vota la gente en tiempo real.</span></div>
              <div className="modal-rule"><span>🔒</span><span>Los últimos 5s la barra se oculta. Puedes cambiar tu voto.</span></div>
              <div className="modal-rule"><span>🏆</span><span>Gana quien esté en la minoría. Cuanto más aplastante, mayor premio.</span></div>
              <div className="modal-rule"><span>🤝</span><span>En caso de empate se devuelve la apuesta íntegra.</span></div>
            </div>
            <button className="btn-gold" onClick={() => setShowWelcome(false)}>¡EMPEZAR A JUGAR!</button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
