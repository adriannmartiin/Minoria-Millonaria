// ── SOUND SYSTEM ─────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function getACtx() { if (!_actx) _actx = new AudioCtx(); return _actx; }

function playTone(freq, type, duration, vol = 0.3, delay = 0) {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t); osc.stop(t + duration);
  } catch(e) {}
}

/* TOKEN CHART */

.chart-title{font-family:'Orbitron',sans-serif;font-size:.72rem;color:rgba(255,255,255,.35);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;font-weight:700}

/* TOURNAMENTS */

.tourn-title{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;color:#fff;margin-bottom:8px}

.tourn-badge{font-size:.72rem;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:20px;text-transform:uppercase}

.tourn-btn{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:10px;padding:12px 24px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;letter-spacing:.1em;transition:opacity .2s}

.tourn-btn.joined{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;cursor:default}

.tourn-banner-btn{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:8px 16px;color:#fbbf24;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.08em}

/* HISTORY EXPAND */

/* REDEMPTION */
.redeem{min-height:100vh;padding:28px 24px;max-width:800px;margin:0 auto}

/* MISSIONS */
.missions{min-height:100vh;padding:28px 24px}
.mission-list{display:flex;flex-direction:column;gap:10px;max-width:800px;margin:0 auto}
.mission-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px}

.admin{min-height:100vh;padding:28px 24px;max-width:900px;margin:0 auto}

.badge-claim-btn{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:8px;padding:8px 16px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;cursor:pointer;letter-spacing:.08em;white-space:nowrap;flex-shrink:0}
.badge-claimed-tag{font-size:.7rem;color:#4ade80;font-weight:700;letter-spacing:.1em}

@keyframes toast-out{0%{transform:translateY(0);opacity:1}100%{transform:translateY(80px);opacity:0}}

.badge-toast-sub{font-size:.78rem;color:rgba(255,255,255,.5);font-weight:500}
.badge-toast-btn{background:linear-gradient(135deg,#fbbf24,#d97706);border:none;border-radius:8px;padding:8px 18px;color:#0a0a0f;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;cursor:pointer;margin-top:10px;letter-spacing:.08em}
.gift-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9997;padding:24px}

.gift-msg{font-size:.9rem;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:20px}

function AdminStats({ sbUrl, sbKey }) {
  const [stats, setStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => { loadStats(); }, []);
  async function loadStats() {
    setLoading(true);
    try {
      const h24 = new Date(Date.now()-86400000).toISOString();
      const h48 = new Date(Date.now()-172800000).toISOString();
      const w1  = new Date(Date.now()-604800000).toISOString();
      const m1  = new Date(Date.now()-2592000000).toISOString();
      const [profiles, history, referrals, adViews] = await Promise.all([
        fetch(`${sbUrl}/rest/v1/profiles?select=id,username,tokens,created_at&order=tokens.desc`,{headers:{apikey:sbKey}}).then(r=>r.json()),
        fetch(`${sbUrl}/rest/v1/match_history?select=room_id,created_at`,{headers:{apikey:sbKey}}).then(r=>r.json()),
        fetch(`${sbUrl}/rest/v1/referrals?select=id`,{headers:{apikey:sbKey}}).then(r=>r.json()),
        fetch(`${sbUrl}/rest/v1/ad_views?select=id,viewed_at`,{headers:{apikey:sbKey}}).then(r=>r.json()).catch(()=>[]),
      ]);
      const p = Array.isArray(profiles)?profiles:[];
      const h = Array.isArray(history)?history:[];
      const av = Array.isArray(adViews)?adViews:[];
      const roomCounts={};
      h.forEach(r=>{roomCounts[r.room_id]=(roomCounts[r.room_id]||0)+1;});
      setStats({
        totalUsers:p.length,
        tokensInCirculation:p.reduce((s,u)=>s+(u.tokens||0),0),
        totalGames:h.length,
        reg24h:p.filter(u=>new Date(u.created_at)>new Date(h24)).length,
        reg48h:p.filter(u=>new Date(u.created_at)>new Date(h48)).length,
        regW:p.filter(u=>new Date(u.created_at)>new Date(w1)).length,
        regM:p.filter(u=>new Date(u.created_at)>new Date(m1)).length,
        roomCounts,
        totalRefs:Array.isArray(referrals)?referrals.length:0,
        totalAds:av.length,
        ads24h:av.filter(a=>new Date(a.viewed_at)>new Date(h24)).length,
        ads48h:av.filter(a=>new Date(a.viewed_at)>new Date(h48)).length,
        adsW:av.filter(a=>new Date(a.viewed_at)>new Date(w1)).length,
        adsM:av.filter(a=>new Date(a.viewed_at)>new Date(m1)).length,
        top10: p.slice(0,10),
        avgTokens: p.length > 0 ? Math.round(p.reduce((s,u)=>s+(u.tokens||0),0)/p.length) : 0,
      });
    } catch(e){}
    setLoading(false);
  }
  const card={background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"18px 20px",textAlign:"center"};
  const val={fontFamily:"'Orbitron',sans-serif",fontSize:"1.5rem",fontWeight:900,color:"#fbbf24",marginBottom:4};
  const lbl={fontSize:".7rem",color:"rgba(255,255,255,.35)",letterSpacing:".15em",textTransform:"uppercase",fontWeight:700};
  const sec={fontFamily:"'Orbitron',sans-serif",fontSize:".72rem",color:"rgba(255,255,255,.3)",letterSpacing:".2em",textTransform:"uppercase",marginBottom:12,marginTop:20};
  const grid={display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:8};
  const rooms={starter:"🌱 Starter",medium:"⚡ Medium",prime:"👑 Prime",vip:"💎 VIP",elite:"💠 Elite"};
  if(loading) return <div style={{padding:40,textAlign:"center",color:"rgba(255,255,255,.3)",fontFamily:"'Orbitron',sans-serif",fontSize:".8rem",letterSpacing:".2em"}}>CARGANDO...</div>;
  if(!stats) return null;
  return (
    <div>
      <div style={sec}>RESUMEN GLOBAL</div>
      <div style={grid}>
        <div style={card}><div style={val}>{stats.totalUsers.toLocaleString()}</div><div style={lbl}>Usuarios totales</div></div>
        <div style={card}><div style={{...val,color:"#4ade80"}}>{stats.tokensInCirculation.toLocaleString()}</div><div style={lbl}>Tokens circulación</div></div>
        <div style={card}><div style={{...val,color:"#60a5fa"}}>{stats.totalGames.toLocaleString()}</div><div style={lbl}>Partidas totales</div></div>
        <div style={card}><div style={{...val,color:"#c084fc"}}>{stats.totalRefs.toLocaleString()}</div><div style={lbl}>Referidos totales</div></div>
      </div>
      <div style={sec}>NUEVOS REGISTROS</div>
      <div style={grid}>
        <div style={card}><div style={val}>{stats.reg24h}</div><div style={lbl}>24 horas</div></div>
        <div style={card}><div style={val}>{stats.reg48h}</div><div style={lbl}>48 horas</div></div>
        <div style={card}><div style={val}>{stats.regW}</div><div style={lbl}>1 semana</div></div>
        <div style={card}><div style={val}>{stats.regM}</div><div style={lbl}>1 mes</div></div>
      </div>
      <div style={sec}>PARTIDAS POR SALA</div>
      <div style={grid}>
        {Object.entries(rooms).map(([id,name])=>(
          <div key={id} style={card}><div style={{...val,fontSize:"1.2rem"}}>{(stats.roomCounts[id]||0).toLocaleString()}</div><div style={lbl}>{name}</div></div>
        ))}
      </div>
      <button onClick={loadStats} style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px 16px",color:"rgba(255,255,255,.4)",fontFamily:"'Orbitron',sans-serif",fontSize:".65rem",cursor:"pointer",letterSpacing:".1em",marginTop:12}}>🔄 ACTUALIZAR</button>
      <div style={sec}>ANUNCIOS VISTOS</div>
      <div style={grid}>
        <div style={card}><div style={{...val,color:"#f97316"}}>{(stats.totalAds||0).toLocaleString()}</div><div style={lbl}>Total anuncios</div></div>
        <div style={card}><div style={val}>{stats.ads24h||0}</div><div style={lbl}>24 horas</div></div>
        <div style={card}><div style={val}>{stats.ads48h||0}</div><div style={lbl}>48 horas</div></div>
        <div style={card}><div style={val}>{stats.adsW||0}</div><div style={lbl}>1 semana</div></div>
        <div style={card}><div style={val}>{stats.adsM||0}</div><div style={lbl}>1 mes</div></div>
      </div>
      <div style={sec}>TOP 10 JUGADORES POR TOKENS</div>
      <div style={{...grid,gridTemplateColumns:"1fr",marginBottom:8}}>
        <div style={card}><div style={{...val,color:"#a78bfa"}}>{(stats.avgTokens||0).toLocaleString()}</div><div style={lbl}>Media de tokens por usuario</div></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {(stats.top10||[]).map((u,i)=>(
          <div key={u.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:"10px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:".8rem",color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#b45309":"rgba(255,255,255,.3)",fontWeight:900,width:28}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
              </span>
              <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:".82rem",fontWeight:700,color:"#fff"}}>{u.username}</span>
            </div>
            <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:".82rem",fontWeight:700,color:"#4ade80"}}>{(u.tokens||0).toLocaleString()} 🪙</span>
          </div>
        ))}
      </div>
      <button onClick={loadStats} style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px 16px",color:"rgba(255,255,255,.4)",fontFamily:"'Orbitron',sans-serif",fontSize:".65rem",cursor:"pointer",letterSpacing:".1em"}}>🔄 ACTUALIZAR</button>
}

  async function loadRoomStats() {
    try {
      const rooms = await dbGet("game_rooms", "select=room_id,started_at,round_id", KEY);
      const votes = await dbGet("round_votes", "select=room_id,round_id", KEY);
      const stats = {};
      ROOMS.forEach(r => {
        const row = rooms && rooms.find(x => x.room_id === r.id);
        const elapsed = row ? (Date.now() - new Date(row.started_at).getTime()) / 1000 : null;
        const nextIn = elapsed !== null ? Math.max(0, Math.ceil(ROUND_TOTAL - elapsed)) : null;
        const players = votes ? votes.filter(v => v.room_id === r.id && row && v.round_id === row.round_id).length : 0;
        stats[r.id] = { players, nextIn, active: players > 0 };
      });
      setRoomStats(stats);
    } catch(e) {}
  }

  useEffect(() => {

    } else {
      clearInterval(roomStatsRef.current);
    }
    return () => clearInterval(roomStatsRef.current);
  }, [screen]);

  async function checkTournamentBanner() {
    try {
      const data = await dbGet("tournaments", "order=starts_at.asc", KEY);
      if (!Array.isArray(data)) return;
      const now = Date.now();
      const soon = data.find(t => {
        const diff = new Date(t.starts_at).getTime() - now;
        return diff > 0 && diff < 86400000; // within 24h
      });
      setLobbyTournBanner(soon || null);
    } catch(e) {}
  }

  async function checkDailyBonus(profile, userId, token) {
    const today = new Date().toISOString().split("T")[0];
    if (profile.last_bonus_date === today) return;
    const day = profile.last_bonus_date ? (profile.bonus_day || 0) : 0;
    const nextDay = (day % 7);
    const amount = DAILY_BONUS[nextDay];
    const newToks = (profile.tokens || 0) + amount;
    await dbUpdate("profiles", `id=eq.${userId}`,
      { tokens: newToks, last_bonus_date: today, bonus_day: nextDay + 1 }, token);
    tokRef.current = newToks;
    setUser(u => ({ ...u, tokens: newToks }));
    setBonusAmount(amount);
    setBonusDay(nextDay + 1);
    setBonusDayIdx(nextDay);
    setShowBonus(true);
    soundBonus();
  }

  async function loadRanking() {
    // Get match history from last 24h and count wins per user
    const h24 = new Date(Date.now()-86400000).toISOString();
    const hist = await dbGet("match_history", `created_at=gt.${h24}&result=eq.win&select=user_id`, KEY);
    const profiles = await dbGet("profiles", "select=id,username,win_streak", KEY);
    if (!Array.isArray(hist) || !Array.isArray(profiles)) { setRanking([]); setScreen("ranking"); return; }
    // Count wins per user in last 24h
    const winCounts = {};
    hist.forEach(h => { winCounts[h.user_id] = (winCounts[h.user_id] || 0) + 1; });
    const ranked = profiles
      .filter(p => winCounts[p.id])
      .map(p => ({ ...p, wins24h: winCounts[p.id] || 0 }))
      .sort((a, b) => b.wins24h - a.wins24h)
      .slice(0, 10);
    setRanking(ranked);
    setScreen("ranking");
  }

  // ── TOURNAMENTS / REFERRAL / NOTIFICATIONS ───────────────────────────────
  async function loadTournaments() {
    const data = await dbGet("tournaments", "order=starts_at.asc", KEY);
    const tourns = Array.isArray(data) ? data : [];
    setTournaments(tourns);
    if (userIdRef.current) {
      const entries = await dbGet("tournament_entries", `user_id=eq.${userIdRef.current}`, tokenRef.current);
      setMyEntries(Array.isArray(entries) ? entries.map(e => e.tournament_id) : []);
    }
    buildNotifications(tourns);
    setScreen("tournaments");
  }

  async function joinTournament(t) {
    if (tokRef.current < t.entry_cost) return;
    await dbInsertRaw("tournament_entries", { tournament_id: t.id, user_id: userIdRef.current }, tokenRef.current);
    await saveTok(tokRef.current - t.entry_cost);
    setMyEntries(prev => [...prev, t.id]);
    soundBonus();
  }

  function buildNotifications(tourns) {
    const notifs = [];
    tourns.forEach(t => {
      const diff = new Date(t.starts_at) - Date.now();
      const hours = Math.floor(diff / 3600000);
      if (diff > 0 && hours < 48) {
        notifs.push({ id: t.id, title: `🏆 ${t.title}`, sub: `Empieza en ${hours < 1 ? "menos de 1h" : hours + "h"} · Premio: ${t.prize?.toLocaleString()} tokens`, unread: true });
      }
    });
    notifs.push({ id: "bonus", title: "🎁 Bonus diario disponible", sub: "Entra cada día para conseguir tokens gratis", unread: false });
    setNotifications(notifs);
    setUnreadNotif(notifs.some(n => n.unread));
  }

  async function loadProfile() {
    const hist = await dbGet("match_history", `user_id=eq.${userIdRef.current}&order=created_at.desc&limit=20`, tokenRef.current);
    setHistory(Array.isArray(hist) ? hist : []);
    const prof = await dbGet("profiles", `id=eq.${userIdRef.current}`, tokenRef.current);
    if (prof && prof[0]) setRefCode(prof[0].referral_code || "");
    setScreen("profile");
  }

  function copyRefLink() {
    const link = `${window.location.origin}?ref=${refCode}`;
    navigator.clipboard?.writeText(link).catch(() => {});
    setRefCopied(true);
    setTimeout(() => setRefCopied(false), 2000);
  }

  const [resetToken, setResetToken] = useState("");
  const [resetPw, setResetPw] = useState({ pw1: "", pw2: "" });
  const [resetErr, setResetErr] = useState("");
  const [resetOk, setResetOk] = useState("");
  const [resetBusy, setResetBusy] = useState(false);

  useEffect(() => {
    // Check for password reset token in URL hash
    const hash = window.location.hash;
    if (hash && hash.includes("access_token")) {
      const params = new URLSearchParams(hash.replace("#", "?"));
      const token = params.get("access_token");
      const type = params.get("type");
      if (token && type === "recovery") {
        setResetToken(token);
        setScreen("reset");
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }
    // Referral code
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    if (ref) { setRegRefCode(ref); localStorage.setItem("mm_ref", ref); }
    else { const stored = localStorage.getItem("mm_ref"); if (stored) setRegRefCode(stored); }
  }, []);

  async function doResetPassword() {
    setResetErr(""); setResetOk("");
    if (!resetPw.pw1 || !resetPw.pw2) { setResetErr("Completa los dos campos"); return; }
    if (resetPw.pw1 !== resetPw.pw2) { setResetErr("Las contraseñas no coinciden"); return; }
    if (resetPw.pw1.length < 6) { setResetErr("Mínimo 6 caracteres"); return; }
    setResetBusy(true);
    try {
      const res = await authPut("user", { password: resetPw.pw1 }, resetToken);
      if (res.error) { setResetErr(res.error_description || "Error al cambiar la contraseña"); }
      else { setResetOk("✅ Contraseña cambiada correctamente"); setTimeout(() => setScreen("auth"), 2500); }
    } catch(e) { setResetErr("Error de conexión"); }
    setResetBusy(false);
  }

    { label: "España (CET)", tz: "Europe/Madrid" },
    { label: "UK (GMT)", tz: "Europe/London" },
    { label: "Nueva York (ET)", tz: "America/New_York" },
    { label: "México (CT)", tz: "America/Mexico_City" },
    { label: "Buenos Aires (ART)", tz: "America/Argentina/Buenos_Aires" },
    { label: "Bogotá (COT)", tz: "America/Bogota" },
    { label: "Dubai (GST)", tz: "Asia/Dubai" },
    { label: "Tokio (JST)", tz: "Asia/Tokyo" },
  ];

  function formatTZ(isoDate, tzName) {
    try {
      return new Date(isoDate).toLocaleString("es-ES", { timeZone: tzName, day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
    } catch(e) { return isoDate; }
  }

  // ── AUTH ──────────────────────────────────────────────────────────────────
  async function doRegister() {
    setErr(""); setMsg("");
    const { name, email, pw } = form;
    if (!name.trim() || !email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    if (!email.includes("@")) { setErr("Correo no válido"); return; }
    if (pw.length < 6) { setErr("Mínimo 6 caracteres"); return; }
    setBusy(true);
    try {
      const data = await authCall("signup", { email, password: pw });
      if (data.error) { setErr(data.error_description || data.error); setBusy(false); return; }
      if (data.access_token) {
        tokenRef.current = data.access_token;
        userIdRef.current = data.user.id;
        await dbInsertRaw("profiles", { id: data.user.id, username: name, tokens: regRefCode ? 1500 : 1000 }, data.access_token);
        tokRef.current = regRefCode ? 1500 : 1000;
        setEmail(email);
        setUser({ name, tokens: regRefCode ? 1500 : 1000 });
        setShowWelcome(true);
        applyReferral(data.user.id);
        setScreen("lobby");
      } else {
        setMsg("✅ Revisa tu correo para confirmar la cuenta");
      }
    } catch(e) { setErr("Error de conexión"); }

  function getWeekKey() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 1);
    const week = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
    return `${now.getFullYear()}-W${week}`;
  }

  function getWeekMissions() {
    const week = parseInt(getWeekKey().split("W")[1]);
    // Deterministic shuffle based on week number
    const shuffled = [...MISSION_POOL].sort((a,b) => {
      const ha = (week * 31 + a.id.charCodeAt(0)) % 100;
      const hb = (week * 31 + b.id.charCodeAt(0)) % 100;
      return ha - hb;
    });
    return shuffled.slice(0, 4);
  }

  async function loadMissions() {
    const weekKey = getWeekKey();
    const weekStart = new Date(); weekStart.setHours(0,0,0,0);
    weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    const weekStartISO = weekStart.toISOString();

    const [hist, completions, refs] = await Promise.all([
      dbGet("match_history", `user_id=eq.${userIdRef.current}&created_at=gt.${weekStartISO}&select=result,room_id`, tokenRef.current),
      dbGet("mission_completions", `user_id=eq.${userIdRef.current}&week_key=eq.${weekKey}`, tokenRef.current),
      dbGet("referrals", `referrer_id=eq.${userIdRef.current}&created_at=gt.${weekStartISO}`, tokenRef.current),
    ]);

    const h = Array.isArray(hist) ? hist : [];

    setMissionStats({ wins, games, refs: refCount, vip: vipGames, elite: eliteGames, starter: starterWins });

    setMissionCompletions(Array.isArray(completions) ? completions : []);

  async function pollRound(r) {
    try {
      const rows = await dbGet("game_rooms", `room_id=eq.${r.id}`, tokenRef.current);
      const row = rows && rows[0];
      if (!row) { await startNewRound(r); return; }
      const elapsed = (Date.now() - new Date(row.started_at).getTime()) / 1000;
      if (elapsed >= ROUND_TOTAL) { await startNewRound(r); return; }

      // Si es una ronda nueva (round_id distinto), resetear voto
      if (roundRef.current && roundRef.current.round_id !== row.round_id) {
        voteRef.current = null;
        setVote(null);
        setResult(null);
        resultSaved.current = false;
      }

      roundRef.current = row; setRound(row);
      const votes = await dbGet("round_votes", `round_id=eq.${row.round_id}`, tokenRef.current);
      const cA = votes ? votes.filter(v => v.vote === "a").length : 0;
      const cB = votes ? votes.filter(v => v.vote === "b").length : 0;
      setVC({ a: cA, b: cB });

      if (elapsed < VOTE_VISIBLE) {
        const tl = Math.ceil(VOTE_VISIBLE - elapsed);
        if (tl <= 3) soundTick();
        setPhase("voting"); setTL(tl);
      } else if (elapsed < VOTE_VISIBLE + VOTE_HIDDEN) {
        const tl = Math.ceil(VOTE_VISIBLE + VOTE_HIDDEN - elapsed);
        if (tl <= 3) soundTick();
        setPhase("hidden"); setTL(tl);
      } else {
        setPhase("result");
        setNextIn(Math.ceil(ROUND_TOTAL - elapsed));
        // Solo calcular resultado si el jugador votó en esta ronda
        if (!resultSaved.current && voteRef.current !== null) {
          resultSaved.current = true;
          computeResult(r, row, cA, cB);
        } else if (!resultSaved.current && voteRef.current === null) {
          resultSaved.current = true;
          setResult({ noVote: true, cA, cB, q: { a: row.question_a, b: row.question_b } });
        }
      }
    } catch(e) { console.error(e); }
  }

  async function startNewRound(r) {
    const q = rand(QUESTIONS);
    resultSaved.current = false;
    // Reset vote change counter
    voteChangeCount.current = 0;
    setShowVoteMsg(false);
    voteRef.current = null; setVote(null); setResult(null); setVC({ a: 0, b: 0 });
    await dbUpsert("game_rooms", {
      room_id: r.id,
      round_id: (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)),
      question_a: q.a, question_b: q.b,
      started_at: new Date().toISOString(),
      votes_a: 0, votes_b: 0, phase: "voting"
    }, "room_id", tokenRef.current);
  }

  async function castVote(v) {
    if (!roundRef.current) return;
    const elapsed = (Date.now() - new Date(roundRef.current.started_at).getTime()) / 1000;
    if (elapsed >= VOTE_VISIBLE + VOTE_HIDDEN) return;
    // Rate limiting message after 5 changes
    if (voteRef.current !== null) {
      voteChangeCount.current += 1;
      if (voteChangeCount.current >= 5) {
        setShowVoteMsg(true);
        clearTimeout(voteMsgTimer.current);
        voteMsgTimer.current = setTimeout(() => setShowVoteMsg(false), 3000);
      }
    }
    voteRef.current = v; setVote(v);
    setVoteFlash(v);
    setTimeout(() => setVoteFlash(null), 300);
    soundVote();
    await dbUpsert("round_votes", {
      round_id: roundRef.current.round_id,
      user_id: userIdRef.current,
      vote: v,
      room_id: roundRef.current.room_id
    }, "round_id,user_id", tokenRef.current);
  }

  async function computeResult(r, row, cA, cB) {
    const myVote = voteRef.current;
    const total = cA + cB;
    let minority = "tie";
    if (cA < cB) minority = "a";
    else if (cB < cA) minority = "b";
    let delta = 0, win = false, tie = minority === "tie";
    let resultStr = myVote === null ? "no_vote" : "lose";

    if (myVote !== null) {
      if (tie) {
        delta = 0; resultStr = "tie";
      } else {
        const minC = minority === "a" ? cA : cB;
        const prizePool = Math.floor(total * r.cost * 0.90);
        if (myVote === minority) {
          win = true; resultStr = "win";
          delta = Math.floor(prizePool / minC) - r.cost;
        } else {
          delta = -r.cost; resultStr = "lose";
        }
      }
    }

    const newTok = Math.max(0, tokRef.current + delta);

    // Streak tracking
    let newStreak = streak;
    let newMaxStreak = 0;
    let newStreakTokens = 0;
    if (resultStr === "win") {
      newStreak = streak + 1;
      soundWin();
    } else if (resultStr === "lose") {
      newStreak = 0;
      soundLose();
    }
    setStreak(newStreak);

    // Update profile with tokens + streak
    const profileUpdate = { tokens: newTok, win_streak: newStreak };
    if (resultStr === "win") {
      profileUpdate.streak_tokens = delta;
    } else if (resultStr === "lose") {
      profileUpdate.streak_tokens = 0;
    }
    tokRef.current = newTok;
    setUser(u => ({ ...u, tokens: newTok }));
    await dbUpdate("profiles", `id=eq.${userIdRef.current}`, profileUpdate, tokenRef.current);

    setResult({ win, tie, delta, cA, cB, minority, myVote, noVote: myVote === null, q: { a: row.question_a, b: row.question_b }, streak: newStreak });
    // Check badges after every game
    setTimeout(() => checkBadgesProgress(), 2000);

    // Save to history
    if (myVote !== null) {
      await dbInsertRaw("match_history", {
        user_id: userIdRef.current,
        room_id: r.id,
        round_id: row.round_id,
        vote: myVote,
        result: resultStr,
        delta,
        tokens_after: newTok,
        question_a: row.question_a,
        question_b: row.question_b,
        minority,
        votes_a: cA,
        votes_b: cB
      }, tokenRef.current);
    }
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  const tot = voteCounts.a + voteCounts.b;
  const pA  = tot > 0 ? Math.round((voteCounts.a / tot) * 100) : 50;
  const C   = 2 * Math.PI * 33;
  const TT  = phase === "voting" ? VOTE_VISIBLE : VOTE_HIDDEN;
  const off = C - (Math.min(timeLeft, TT) / TT) * C;
  const tc  = phase === "voting" ? "#fbbf24" : "#c084fc";

      {/* ── RESET PASSWORD ── */}

              <div className="field">
                <label>Repetir contraseña</label>

            </div>
          </div>
        </div>

      {/* ── AUTH ── */}
      {screen === "auth" && (

      {screen === "game" && room && (

            <div className="token-pill">{COIN} {user?.tokens?.toLocaleString()}</div>
          </div>
          <div className="game-card" style={{borderColor: room.color + "33", boxShadow: room.glow}}>
            {phase === "waiting" && (
              <div className="waiting">
                <div className="dots"><div className="dot"></div><div className="dot"></div><div className="dot"></div></div>
                <div className="wait-txt">Conectando a la sala...</div>
              </div>
            )}
            {(phase === "voting" || phase === "hidden") && roundData && (
              <div>
                <div className="phase-tag">{phase === "voting" ? "⚡ Votación en directo" : "🔒 Barra oculta · Última oportunidad"}</div>
                <div className="timer-wrap">
                  <div className="timer-ring">
                    <svg width="76" height="76" viewBox="0 0 76 76">
                      <circle cx="38" cy="38" r="33" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5" />
                      <circle cx="38" cy="38" r="33" fill="none" stroke={tc} strokeWidth="5"
                        strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
                        style={{ transition: "stroke-dashoffset .95s linear" }} />
                    </svg>
                    <div className="timer-num">{timeLeft}</div>
                  </div>
                </div>
                <div className="question">¿ {roundData.question_a} &nbsp;vs&nbsp; {roundData.question_b} ?</div>
                {streak >= 2 && (
                  <div className="streak-bar">
                    <span className="streak-fire">🔥</span>
                    <span className="streak-txt">RACHA: {streak} VICTORIAS SEGUIDAS</span>
                  </div>
                )}
                <div className="choices">
                  <button className={`choice${vote === "a" ? " sel" : ""}${voteFlash === "a" ? " flash" : ""}`} onClick={() => castVote("a")}>{roundData.question_a}</button>
                  <button className={`choice${vote === "b" ? " sel" : ""}${voteFlash === "b" ? " flash" : ""}`} onClick={() => castVote("b")}>{roundData.question_b}</button>
                </div>
                {vote === null && <div style={{textAlign:"center",fontSize:".78rem",color:"rgba(255,255,255,.25)",letterSpacing:".15em",marginBottom:12}}>TAP PARA VOTAR</div>}
                {phase === "voting" ? (
                  <div className="bar-wrap">
                    <div className="bar-heads">
                      <span style={{color:"#4ade80"}}>{roundData.question_a} · {pA}%</span>
                      <span style={{color:"#60a5fa"}}>{roundData.question_b} · {100-pA}%</span>
                    </div>
                    <div className="bar-track"><div className="bar-a" style={{width:`${pA}%`}}></div></div>
                    <div className="bar-total">{tot} votos en esta ronda</div>
                  </div>
                ) : (
                  <div className="hidden-bar">🔒 Barra oculta — ¿te mantienes?</div>
                )}
              </div>
            )}
            {phase === "result" && result && roundData && (
              <div className="result">
                {result.win && (
                  <div className="confetti-wrap">
                    {[...Array(12)].map((_, i) => (
                      <div key={i} className="confetti-piece" style={{
                        left: `${(i * 8.5) % 100}%`,
                        background: ["#fbbf24","#4ade80","#60a5fa","#c084fc","#f97316"][i % 5],
                        animationDelay: `${i * 0.08}s`,
                        animationDuration: `${0.9 + (i % 3) * 0.2}s`
                      }} />
                    ))}
                  </div>
                )}
                {result.noVote ? (
                  <>
                    <div className="verdict tie">SIN VOTO</div>
                    <div className="verdict-sub">No votaste a tiempo</div>
                    <div className="token-delta z">±0 {COIN}</div>
                  </>
                ) : (
                  <>
                    <div className={`verdict win-anim ${result.tie ? "tie" : result.win ? "win" : "lose"}`}>
                      {result.tie ? "EMPATE" : result.win ? "¡GANASTE!" : "PERDISTE"}
                    </div>
                    <div className="verdict-sub">
                      {result.tie ? "Mismo número de votos — se devuelve todo"

                    </div>
                    <div className={`token-delta ${result.delta > 0 ? "p" : result.delta < 0 ? "n" : "z"}${result.win ? " coin-glow" : ""}`}>
                      {result.delta > 0 ? "+" : ""}{result.delta.toLocaleString()} {COIN}
                    </div>
                    {result.win && result.streak >= 2 && (
                      <div className="streak-bar" style={{marginTop:8}}>
                        <span className="streak-fire">🔥</span>
                        <span className="streak-txt">¡RACHA DE {result.streak}!</span>

                )}
                <div className="bar-wrap" style={{maxWidth:480,margin:"0 auto 8px"}}>
                  <div className="bar-heads">
                    <span style={{color:"#4ade80"}}>{roundData.question_a} · {Math.round((result.cA||0)/Math.max((result.cA||0)+(result.cB||0),1)*100)}%</span>
                    <span style={{color:"#60a5fa"}}>{roundData.question_b} · {Math.round((result.cB||0)/Math.max((result.cA||0)+(result.cB||0),1)*100)}%</span>
                  </div>
                  <div className="bar-track"><div className="bar-a" style={{width:`${Math.round((result.cA||0)/Math.max((result.cA||0)+(result.cB||0),1)*100)}%`}}></div></div>
                  <div className="bar-total">{(result.cA||0)+(result.cB||0)} votos totales</div>
                </div>
                <div className="next-round">🔄 Nueva ronda en {nextIn}s...</div>
                <button className="r-btn" onClick={() => { stopGame(); setScreen("lobby"); }}>CAMBIAR SALA</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── PROFILE ── */}
      {screen === "profile" && (
        <div className="profile">
          <div className="topbar">
            <div className="topbar-logo">MI PERFIL</div>
            <div className="topbar-right">
              <div className="token-pill">{COIN} {user?.tokens?.toLocaleString()}</div>
              <button className="ghost-btn" onClick={() => setScreen("lobby")}>← Lobby</button>
            </div>
          </div>

          {/* Avatar + info */}
          <div className="profile-hero">
            <div className="avatar">{user?.name?.[0]?.toUpperCase() || "?"}</div>
            <div>
              <div className="profile-name">{user?.name}</div>
              <div className="profile-email">{userEmail}</div>
              <div style={{marginTop:8,fontSize:".8rem",color:"rgba(255,255,255,.3)",fontWeight:600}}>
                {COIN} {user?.tokens?.toLocaleString()} tokens
              </div>
            </div>
          </div>

          {/* Stats */}
          <div className="section-title">Estadísticas</div>
          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-val">{stats.total}</div>
              <div className="stat-lbl">Partidas</div>
            </div>
            <div className="stat-card">
              <div className="stat-val" style={{color:"#4ade80"}}>{stats.wins}</div>
              <div className="stat-lbl">Victorias</div>
            </div>
            <div className="stat-card">

            </div>
          </div>

          {/* Token chart */}
          {history.length > 1 && (() => {
            const pts = [...history].reverse().map(h => h.tokens_after).filter(Boolean);
            if (pts.length < 2) return null;
            const min = Math.min(...pts), max = Math.max(...pts);
            const range = max - min || 1;
            const W = 600, H = 80;
            const x = i => (i / (pts.length - 1)) * W;
            const y = v => H - ((v - min) / range) * H;
            const d = pts.map((v,i) => `${i===0?'M':'L'}${x(i)},${y(v)}`).join(' ');
            return (
              <div className="chart-wrap">

      {showGift && (
        <div className="gift-overlay">
          <div className="gift-card">
            <div className="gift-icon">🎁</div>
            <div className="gift-title">{showGift.title}</div>
            <div className="gift-msg">{showGift.message}</div>
            {showGift.tokens_gift > 0 && (
              <div className="gift-amount">+{showGift.tokens_gift.toLocaleString()} {COIN}</div>
            )}
            <button className="gift-btn" disabled={claimingGift} onClick={() => claimGift(showGift)}>
              {claimingGift ? "CANJEANDO..." : "🎁 CANJEAR REGALO"}
            </button>
          </div>
        </div>
      )}

      {/* ── SESSION EXPIRED ── */}
      {sessionExpired && (
        <div className="session-overlay">
          <div className="session-card">
            <div className="session-icon">⏰</div>
            <div className="session-title">SESIÓN EXPIRADA</div>
            <div className="session-text">
              Tu sesión ha caducado por inactividad.<br/>
              Recarga la página para volver a jugar — tus tokens y progreso están guardados.
            </div>
            <button className="session-btn" onClick={() => window.location.reload()}>
              RECARGAR Y CONTINUAR
            </button>
          </div>
        </div>
      )}

      {/* ── ADMIN ── */}
      {screen === "admin" && (
        <div className="admin">
          <div className="topbar">
            <div className="topbar-logo" style={{color:"#f87171"}}>⚙️ PANEL ADMIN</div>
            <button className="ghost-btn" onClick={() => setScreen("auth")}>← Salir</button>
          </div>

          <div className="admin-tabs">
            <div className={`admin-tab${adminTab==="tournaments"?" active":""}`} onClick={() => setAdminTab("tournaments")}>TORNEOS</div>
            <div className={`admin-tab${adminTab==="announcements"?" active":""}`} onClick={() => setAdminTab("announcements")}>NOTIFICACIONES</div>
            <div className={`admin-tab${adminTab==="stats"?" active":""}`} onClick={() => setAdminTab("stats")}>ESTADÍSTICAS</div>
          </div>

          {adminTab === "tournaments" && (
            <div>
              {adminMsg && <div className="ok" style={{maxWidth:"100%",marginBottom:16}}>{adminMsg}</div>}
              <div className="admin-form">
                <div className="admin-form-title">CREAR NUEVO TORNEO</div>
                <div className="admin-grid">
                  <div className="field" style={{marginBottom:0}}>
                    <label>Título</label>
                    <input type="text" placeholder="Torneo Martes..." value={newTourn.title}
                      onChange={e => setNewTourn(t => ({...t, title: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Fecha y hora (UTC)</label>
                    <input type="datetime-local" value={newTourn.starts_at}
                      onChange={e => setNewTourn(t => ({...t, starts_at: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Coste entrada (tokens)</label>
                    <input type="number" value={newTourn.entry_cost}
                      onChange={e => setNewTourn(t => ({...t, entry_cost: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Premio (tokens)</label>
                    <input type="number" value={newTourn.prize}
                      onChange={e => setNewTourn(t => ({...t, prize: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Máx. jugadores</label>
                    <input type="number" value={newTourn.max_players}
                      onChange={e => setNewTourn(t => ({...t, max_players: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Descripción (opcional)</label>
                    <input type="text" placeholder="Descripción..." value={newTourn.description}
                      onChange={e => setNewTourn(t => ({...t, description: e.target.value}))} />
                  </div>
                </div>
                <button className="btn-gold" style={{marginTop:16,width:"auto",padding:"12px 28px"}} onClick={createTournament}>
                  ➕ CREAR TORNEO
                </button>
              </div>

              <div className="section-title">TORNEOS EXISTENTES</div>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
                {adminTournaments.length === 0 && <div style={{color:"rgba(255,255,255,.25)",fontSize:".85rem"}}>No hay torneos creados</div>}
                {adminTournaments.map(t => (
                  <div key={t.id} className="admin-tourn-row">
                    <div>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".85rem",fontWeight:700,color:"#fff"}}>{t.title}</div>
                      <div style={{fontSize:".75rem",color:"rgba(255,255,255,.35)",marginTop:3}}>
                        {new Date(t.starts_at).toLocaleString("es-ES")} · Premio: {t.prize?.toLocaleString()} · Entrada: {t.entry_cost}
                      </div>
                    </div>
                    <button className="del-btn" onClick={() => deleteTournament(t.id)}>🗑️ BORRAR</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {adminTab === "announcements" && (
            <div>
              {adminMsg && <div className="ok" style={{maxWidth:"100%",marginBottom:16}}>{adminMsg}</div>}
              <div className="admin-form">
                <div className="admin-form-title">CREAR NOTIFICACIÓN / REGALO</div>
                <div className="admin-grid">
                  <div className="field" style={{marginBottom:0}}>
                    <label>Tipo</label>
                    <select className="tz-select" style={{width:"100%",padding:"14px 16px"}} value={newAnn.type}
                      onChange={e => setNewAnn(a => ({...a, type: e.target.value}))}>
                      <option value="notification">📢 Notificación</option>
                      <option value="gift">🎁 Regalo de tokens</option>
                    </select>
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label>Duración (horas)</label>
                    <input type="number" value={newAnn.expires_hours}
                      onChange={e => setNewAnn(a => ({...a, expires_hours: +e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0,gridColumn:"1/-1"}}>
                    <label>Título</label>
                    <input type="text" value={newAnn.title}
                      onChange={e => setNewAnn(a => ({...a, title: e.target.value}))} />
                  </div>
                  <div className="field" style={{marginBottom:0,gridColumn:"1/-1"}}>
                    <label>Mensaje</label>
                    <input type="text" value={newAnn.message}
                      onChange={e => setNewAnn(a => ({...a, message: e.target.value}))} />
                  </div>
                  {newAnn.type === "gift" && (
                    <div className="field" style={{marginBottom:0}}>
                      <label>Tokens a regalar</label>
                      <input type="number" value={newAnn.tokens_gift}
                        onChange={e => setNewAnn(a => ({...a, tokens_gift: +e.target.value}))} />
                    </div>
                  )}
                </div>
                <button className="btn-gold" style={{marginTop:16,width:"auto",padding:"12px 28px"}} onClick={createAnnouncement}>
                  📢 PUBLICAR
                </button>
              </div>

              <div className="section-title">ANUNCIOS ACTIVOS</div>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
                {adminAnnouncements.length === 0 && <div style={{color:"rgba(255,255,255,.25)",fontSize:".85rem"}}>No hay anuncios activos</div>}
                {adminAnnouncements.map(a => (
                  <div key={a.id} className="admin-tourn-row">
                    <div>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".85rem",fontWeight:700,color: a.type==="gift"?"#4ade80":"#fbbf24"}}>
                        {a.type==="gift"?"🎁":"📢"} {a.title}
                      </div>
                      <div style={{fontSize:".75rem",color:"rgba(255,255,255,.35)",marginTop:3}}>
                        {a.message.slice(0,60)}... · Expira: {new Date(a.expires_at).toLocaleString("es-ES")}
                        {a.tokens_gift > 0 && ` · Regalo: ${a.tokens_gift} tokens`}
                      </div>
                    </div>
                    <button className="del-btn" onClick={() => deleteAnnouncement(a.id)}>🗑️ BORRAR</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {adminTab === "stats" && (
            <AdminStats sbUrl={SB} sbKey={KEY} />
          )}
        </div>
      )}

      {/* ── COOKIE BANNER ── */}
      {showCookie && (
        <div className="cookie-banner">
          <div className="cookie-text">
            Usamos cookies para mejorar tu experiencia y mostrar anuncios personalizados.
            Consulta nuestra <span onClick={() => setScreen("privacy")}>Política de Privacidad</span>.
          </div>
          <div className="cookie-btns">
            <button className="cookie-reject" onClick={() => { localStorage.setItem("mm_cookie_ok","reject"); setShowCookie(false); }}>Rechazar</button>
            <button className="cookie-accept" onClick={() => { localStorage.setItem("mm_cookie_ok","accept"); setShowCookie(false); }}>Aceptar</button>
          </div>
        </div>
      )}

      {/* ── WELCOME MODAL ── */}
      {showWelcome && (
        <div className="modal-overlay">
          <div className="modal-card">
            <div className="modal-icon">👑</div>
            <div className="modal-title">¡BIENVENIDO A MINORÍA MILLONARIA!</div>
            <div className="modal-text">El juego donde la minoría siempre gana. Tienes <strong style={{color:"#fbbf24"}}>1.000 tokens</strong> para empezar.</div>
            <div className="modal-rules">
              <div className="modal-rule"><span>⚡</span><span>Cada ronda dura 15 segundos. Elige una opción.</span></div>
              <div className="modal-rule"><span>📊</span><span>Los primeros 10s ves cómo vota la gente en tiempo real.</span></div>
              <div className="modal-rule"><span>🔒</span><span>Los últimos 5s la barra se oculta. Puedes cambiar tu voto.</span></div>
              <div className="modal-rule"><span>🏆</span><span>Gana quien esté en la minoría. Cuanto más aplastante, mayor premio.</span></div>
              <div className="modal-rule"><span>🤝</span><span>En caso de empate se devuelve la apuesta íntegra.</span></div>
            </div>
            <button className="btn-gold" onClick={() => setShowWelcome(false)}>¡EMPEZAR A JUGAR!</button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
