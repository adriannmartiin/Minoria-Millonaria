// ── API HELPERS ──────────────────────────────────────────────────────────────
async function authCall(path, body) {
  const r = await fetch(`${SB}/auth/v1/${path}`, {
    method: "POST",
    headers: { apikey: KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}
async function dbGet(table, query, token) {
  const r = await fetch(`${SB}/rest/v1/${table}?${query}&select=*`, {
    headers: { apikey: KEY, Authorization: `Bearer ${token || KEY}` },
  });
  return r.json();
}
async function dbUpsert(table, body, conflict, token) {
  const r = await fetch(`${SB}/rest/v1/${table}?on_conflict=${conflict}`, {
    method: "POST",
    headers: { apikey: KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "resolution=merge-duplicates,return=representation" },
    body: JSON.stringify(body),
  });
  return r.json();
}
async function dbInsertRaw(table, body, token) {
  const r = await fetch(`${SB}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(body),
  });
  return r;
}
async function dbUpdate(table, query, body, token) {
  await fetch(`${SB}/rest/v1/${table}?${query}`, {
    method: "PATCH",
    headers: { apikey: KEY, Authorization: `Bearer ${token}`, "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(body),
  });
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]   = useState("auth");
  const [mode, setMode]       = useState("register");
  const [form, setForm]       = useState({ name: "", email: "", pw: "" });
  const [err, setErr]         = useState("");
  const [msg, setMsg]         = useState("");
  const [busy, setBusy]       = useState(false);
  const [user, setUser]       = useState(null);

  // Game state
  const [room, setRoom]       = useState(null);
  const [roundData, setRound] = useState(null); // current DB round
  const [vote, setVote]       = useState(null); // 'a' or 'b'
  const [voteCounts, setVC]   = useState({ a: 0, b: 0 });
  const [phase, setPhase]     = useState("waiting"); // waiting|voting|hidden|result
  const [timeLeft, setTimeLeft] = useState(0);
  const [result, setResult]   = useState(null);
  const [nextIn, setNextIn]   = useState(0);

  const tokenRef    = useRef("");
  const userIdRef   = useRef("");
  const tokRef      = useRef(0);
  const voteRef     = useRef(null);
  const roundRef    = useRef(null);
  const pollRef     = useRef(null);
  const tickRef     = useRef(null);
  const resultSaved = useRef(false);

  // ── AUTH ──────────────────────────────────────────────────────────────────
  async function doRegister() {
    setErr(""); setMsg("");
    const { name, email, pw } = form;
    if (!name.trim() || !email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    if (!email.includes("@")) { setErr("Correo no válido"); return; }
    if (pw.length < 6) { setErr("Mínimo 6 caracteres en la contraseña"); return; }
    setBusy(true);
    try {
      const data = await authCall("signup", { email, password: pw });
      if (data.error) { setErr(data.error_description || data.error); setBusy(false); return; }
      if (data.access_token) {
        tokenRef.current = data.access_token;
        userIdRef.current = data.user.id;
        await dbInsertRaw("profiles", { id: data.user.id, username: name, tokens: 1000 }, data.access_token);
        tokRef.current = 1000;
        setUser({ name, tokens: 1000 });
        setScreen("lobby");
      } else {
        setMsg("✅ Revisa tu correo para confirmar la cuenta");
      }
    } catch(e) { setErr("Error de conexión"); }
    setBusy(false);
  }

  async function doLogin() {
    setErr(""); setMsg("");
    const { email, pw } = form;
    if (!email.trim() || !pw.trim()) { setErr("Completa todos los campos"); return; }
    setBusy(true);
    try {
      const data = await authCall("token?grant_type=password", { email, password: pw });
      if (data.error || !data.access_token) { setErr("Correo o contraseña incorrectos"); setBusy(false); return; }
      tokenRef.current = data.access_token;
      userIdRef.current = data.user.id;
      const profiles = await dbGet("profiles", `id=eq.${data.user.id}`, data.access_token);
      if (profiles && profiles[0]) {
        tokRef.current = profiles[0].tokens;
        setUser({ name: profiles[0].username, tokens: profiles[0].tokens });
        setScreen("lobby");
      } else {
        setErr("Perfil no encontrado");
      }
    } catch(e) { setErr("Error de conexión"); }
    setBusy(false);
  }

  function doLogout() {
    stopGame();
    tokenRef.current = "";
    setUser(null);
    setScreen("auth");
  }

  async function saveTok(n) {
    tokRef.current = n;
    setUser(u => ({ ...u, tokens: n }));
    await dbUpdate("profiles", `id=eq.${userIdRef.current}`, { tokens: n }, tokenRef.current);
  }

  // ── ROOM / ROUND LOGIC ────────────────────────────────────────────────────
  function stopGame() {
    clearInterval(pollRef.current);
    clearInterval(tickRef.current);
    setRoom(null);
    setRound(null);
    setVote(null);
    voteRef.current = null;
    roundRef.current = null;
    resultSaved.current = false;
    setPhase("waiting");
    setResult(null);
    setVC({ a: 0, b: 0 });
  }

  async function enterRoom(r) {
    if (tokRef.current < r.cost) return;
    stopGame();
    setRoom(r);
    setScreen("game");
    setPhase("waiting");
    // Start polling
    await pollRound(r);
    pollRef.current = setInterval(() => pollRound(r), 2000);
  }

  async function pollRound(r) {
    try {
      const rows = await dbGet("game_rooms", `room_id=eq.${r.id}`, tokenRef.current);
      const row = rows && rows[0];

      if (!row) {
        // No round exists yet — create one
        await startNewRound(r);
        return;
      }

      const now = Date.now();
      const startedAt = new Date(row.started_at).getTime();
      const elapsed = (now - startedAt) / 1000;

      if (elapsed >= ROUND_TOTAL) {
        // Round expired — start new one (first poll to detect this wins via upsert)
        await startNewRound(r);
        return;
      }

      roundRef.current = row;
      setRound(row);

      // Fetch live vote counts
      const votes = await dbGet("round_votes", `round_id=eq.${row.round_id}`, tokenRef.current);
      const cA = votes ? votes.filter(v => v.vote === "a").length : 0;
      const cB = votes ? votes.filter(v => v.vote === "b").length : 0;
      setVC({ a: cA, b: cB });

      // Determine phase from elapsed time
      if (elapsed < VOTE_VISIBLE) {
        setPhase("voting");
        setTimeLeft(Math.ceil(VOTE_VISIBLE - elapsed));
      } else if (elapsed < VOTE_VISIBLE + VOTE_HIDDEN) {
        setPhase("hidden");
        setTimeLeft(Math.ceil(VOTE_VISIBLE + VOTE_HIDDEN - elapsed));
      } else {
        // Result phase
        setPhase("result");
        const remaining = Math.ceil(ROUND_TOTAL - elapsed);
        setNextIn(remaining);
        if (!resultSaved.current) {
          resultSaved.current = true;
          computeAndSaveResult(r, row, cA, cB);
        }
      }
    } catch(e) { console.error(e); }
  }

  async function startNewRound(r) {
    const q = rand(QUESTIONS);
    const now = new Date().toISOString();
    resultSaved.current = false;
    voteRef.current = null;
    setVote(null);
    setResult(null);
    setVC({ a: 0, b: 0 });

    await dbUpsert("game_rooms", {
      room_id: r.id,
      round_id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
      question_a: q.a,
      question_b: q.b,
      started_at: now,
      votes_a: 0,
      votes_b: 0,
      phase: "voting"
    }, "room_id", tokenRef.current);
  }

  async function castVote(v) {
    if (!roundRef.current || voteRef.current !== null) return;
    const row = roundRef.current;
    const elapsed = (Date.now() - new Date(row.started_at).getTime()) / 1000;
    if (elapsed >= VOTE_VISIBLE + VOTE_HIDDEN) return; // too late

    voteRef.current = v;
    setVote(v);

    await dbInsertRaw("round_votes", {
      round_id: row.round_id,
      user_id: userIdRef.current,
      vote: v,
      room_id: row.room_id
    }, tokenRef.current);
  }

  function computeAndSaveResult(r, row, cA, cB) {
    const myVote = voteRef.current;
    if (myVote === null) {
      setResult({ noVote: true, cA, cB, q: { a: row.question_a, b: row.question_b } });
      return;
    }

    const total = cA + cB;
    let minority = "tie";
    if (cA < cB) minority = "a";
    else if (cB < cA) minority = "b";

    let delta = 0, win = false, tie = minority === "tie";

    if (tie) {
      delta = 0;
    } else {
      const minC = minority === "a" ? cA : cB;
      const totalPot = total * r.cost;
      const houseCut = Math.floor(totalPot * 0.10);
      const prizePool = totalPot - houseCut;
      if (myVote === minority) {
        win = true;
        delta = Math.floor(prizePool / minC) - r.cost;
      } else {
        delta = -r.cost;
      }
    }

    const newTok = Math.max(0, tokRef.current + delta);
    saveTok(newTok);
    setResult({ win, tie, delta, cA, cB, minority, myVote, q: { a: row.question_a, b: row.question_b } });
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  const tot = voteCounts.a + voteCounts.b;
  const pA  = tot > 0 ? Math.round((voteCounts.a / tot) * 100) : 50;
  const C   = 2 * Math.PI * 33;
  const TT  = phase === "voting" ? VOTE_VISIBLE : VOTE_HIDDEN;
  const off = C - (Math.min(timeLeft, TT) / TT) * C;
  const tc  = phase === "voting" ? "#fbbf24" : "#c084fc";

  return (
    <div className="app">
      <style>{CSS}</style>

      {/* ── AUTH ── */}
      {screen === "auth" && (
        <div className="auth">
          <div className="logo-main">MINORÍA<br/>MILLONARIA</div>
          <div className="logo-sub">La minoría siempre gana</div>
          <div className="auth-card">
            <div className="auth-heading">{mode === "register" ? "CREAR CUENTA" : "INICIAR SESIÓN"}</div>
            {err && <div className="err">{err}</div>}
            {msg && <div className="ok">{msg}</div>}
            <div>
              {mode === "register" && (
                <div className="field">
                  <label>Nombre de usuario</label>
                  <input type="text" placeholder="Tu alias..." value={form.name}
                    onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
                </div>
              )}
              <div className="field">
                <label>Correo electrónico</label>
                <input type="email" placeholder="tu@correo.com" value={form.email}
                  onChange={e => setForm(f => ({ ...f, email: e.target.value }))} />
              </div>
              <div className="field">
                <label>Contraseña</label>
                <input type="password" placeholder="••••••••" value={form.pw}
                  onChange={e => setForm(f => ({ ...f, pw: e.target.value }))} />
              </div>
              <button className="btn-gold" disabled={busy}
                onClick={mode === "register" ? doRegister : doLogin}>
                {busy ? "CARGANDO..." : mode === "register" ? "REGISTRARSE · 1000 🪙 GRATIS" : "ENTRAR AL JUEGO"}
              </button>
            </div>
            <div className="auth-switch">
              {mode === "register"
                ? <span>¿Ya tienes cuenta? <span style={{color:"#fbbf24",cursor:"pointer",fontWeight:700}} onClick={() => { setMode("login"); setErr(""); setMsg(""); }}>Inicia sesión</span></span>
                : <span>¿Sin cuenta? <span style={{color:"#fbbf24",cursor:"pointer",fontWeight:700}} onClick={() => { setMode("register"); setErr(""); setMsg(""); }}>Regístrate</span></span>}
            </div>
          </div>
        </div>
      )}

      {/* ── LOBBY ── */}
      {screen === "lobby" && (
        <div className="lobby">
          <div className="topbar">
            <div className="topbar-logo">MINORÍA MILLONARIA</div>
            <div className="topbar-right">
              <div className="token-pill">🪙 {user?.tokens?.toLocaleString()}</div>
              <button className="ghost-btn" onClick={doLogout}>Salir</button>
            </div>
          </div>
          <div className="lobby-hero">
            <div className="lobby-title">ELIGE TU SALA</div>
            <div className="lobby-hint">Hola {user?.name} · Sé parte de la minoría</div>
          </div>
          <div className="rooms">
            {ROOMS.map(r => (
              <div key={r.id}
                className={`room-card${user?.tokens < r.cost ? " locked" : ""}`}
                style={{ border: `1px solid ${r.color}33`, boxShadow: user?.tokens >= r.cost ? r.glow : "none" }}
                onClick={() => enterRoom(r)}>
                <span className="room-icon">{r.icon}</span>
                <div className="room-name" style={{ color: r.color }}>{r.name}</div>
                <div className="room-desc">{r.desc}</div>
                <div className="room-bet">Apuesta: <em style={{ color: r.color }}>{r.cost.toLocaleString()} 🪙</em></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── GAME ── */}
      {screen === "game" && room && (
        <div className="game">
          <div className="game-hdr">
            <button className="ghost-btn" onClick={() => { stopGame(); setScreen("lobby"); }}>← Lobby</button>
            <div className="token-pill" style={{ color: room.color, borderColor: room.color + "44", background: room.color + "12" }}>
              {room.icon} {room.name} · {room.cost.toLocaleString()} 🪙
            </div>
            <div className="token-pill">🪙 {user?.tokens?.toLocaleString()}</div>
          </div>

          <div className="game-card">

            {/* WAITING FOR ROUND */}
            {phase === "waiting" && (
              <div className="waiting">
                <div className="dots"><div className="dot"></div><div className="dot"></div><div className="dot"></div></div>
                <div className="wait-txt">Conectando a la sala...</div>
                <div className="wait-sub">La ronda empieza pronto</div>
              </div>
            )}

            {/* VOTING / HIDDEN */}
            {(phase === "voting" || phase === "hidden") && roundData && (
              <div>
                <div className="phase-tag">
                  {phase === "voting" ? "⚡ Votación en directo" : "🔒 Barra oculta · Última oportunidad"}
                </div>
                <div className="timer-wrap">
                  <div className="timer-ring">
                    <svg width="76" height="76" viewBox="0 0 76 76">
                      <circle cx="38" cy="38" r="33" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5" />
                      <circle cx="38" cy="38" r="33" fill="none" stroke={tc} strokeWidth="5"
                        strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
                        style={{ transition: "stroke-dashoffset .95s linear" }} />
                    </svg>
                    <div className="timer-num">{timeLeft}</div>
                  </div>
                </div>
                <div className="question">¿ {roundData.question_a} &nbsp;vs&nbsp; {roundData.question_b} ?</div>
                <div className="choices">
                  <button
                    className={`choice${vote === "a" ? " sel" : ""}${vote !== null ? " disabled" : ""}`}
                    onClick={() => castVote("a")}>
                    {roundData.question_a}
                  </button>
                  <button
                    className={`choice${vote === "b" ? " sel" : ""}${vote !== null ? " disabled" : ""}`}
                    onClick={() => castVote("b")}>
                    {roundData.question_b}
                  </button>
                </div>
                {vote === null && (
                  <div style={{ textAlign: "center", fontSize: ".78rem", color: "rgba(255,255,255,.25)", letterSpacing: ".15em", marginBottom: 12 }}>
                    TAP PARA VOTAR
                  </div>
                )}
                {phase === "voting" ? (
                  <div className="bar-wrap">
                    <div className="bar-heads">
                      <span style={{ color: "#4ade80" }}>{roundData.question_a} · {pA}%</span>
                      <span style={{ color: "#60a5fa" }}>{roundData.question_b} · {100 - pA}%</span>
                    </div>
                    <div className="bar-track"><div className="bar-a" style={{ width: `${pA}%` }}></div></div>
                    <div className="bar-total">{tot} votos en esta ronda</div>
                  </div>
                ) : (
                  <div className="hidden-bar">🔒 Barra oculta — ¿te mantienes?</div>
                )}
              </div>
            )}

            {/* RESULT */}
            {phase === "result" && result && roundData && (
              <div className="result">
                {result.noVote ? (
                  <>
                    <div className="verdict tie">SIN VOTO</div>
                    <div className="verdict-sub">No votaste a tiempo esta ronda</div>
                    <div className="token-delta z">±0 🪙</div>
                  </>
                ) : (
                  <>
                    <div className={`verdict ${result.tie ? "tie" : result.win ? "win" : "lose"}`}>
                      {result.tie ? "EMPATE" : result.win ? "¡GANASTE!" : "PERDISTE"}
                    </div>
                    <div className="verdict-sub">
                      {result.tie
                        ? "Mismo número de votos — se devuelve todo"
                        : result.win
                        ? `Estabas en la minoría (${result.myVote === "a" ? result.q.a : result.q.b})`
                        : `Estabas en la mayoría (${result.myVote === "a" ? result.q.a : result.q.b})`}
                    </div>
                    <div className={`token-delta ${result.delta > 0 ? "p" : result.delta < 0 ? "n" : "z"}`}>
                      {result.delta > 0 ? "+" : ""}{result.delta.toLocaleString()} 🪙
                    </div>
                  </>
                )}
                {/* Final bar */}
                <div className="bar-wrap" style={{ maxWidth: 480, margin: "0 auto 8px" }}>
                  <div className="bar-heads">
                    <span style={{ color: "#4ade80" }}>{roundData.question_a} · {Math.round((result.cA || 0) / Math.max((result.cA || 0) + (result.cB || 0), 1) * 100)}%</span>
                    <span style={{ color: "#60a5fa" }}>{roundData.question_b} · {Math.round((result.cB || 0) / Math.max((result.cA || 0) + (result.cB || 0), 1) * 100)}%</span>
                  </div>
                  <div className="bar-track">
                    <div className="bar-a" style={{ width: `${Math.round((result.cA || 0) / Math.max((result.cA || 0) + (result.cB || 0), 1) * 100)}%` }}></div>
                  </div>
                  <div className="bar-total">{(result.cA || 0) + (result.cB || 0)} votos totales</div>
                </div>
                <div className="next-round">🔄 Nueva ronda en {nextIn}s...</div>
                <button className="r-btn" onClick={() => { stopGame(); setScreen("lobby"); }}>CAMBIAR SALA</button>
              </div>
            )}

          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
